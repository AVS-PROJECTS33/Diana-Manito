<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Darts Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            background-color: #020617; 
            user-select: none; 
            -webkit-user-select: none;
            font-family: system-ui, -apple-system, sans-serif;
        }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #06b6d4; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICONOS ---
        const IconTarget = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>;
        const IconUsers = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
        const IconUser = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
        const IconPlay = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="currentColor" className={className}><polygon points="5 3 19 12 5 21 5 3"/></svg>;
        const IconArrowRight = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>;
        const IconUndo = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>;
        const IconDart = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="22" y1="2" x2="15" y2="9"/><line x1="10" y1="14" x2="2" y2="22"/><line x1="14" y1="10" x2="10" y2="14"/><path d="M15 9l4 4"/><path d="M22 2l-4-4"/><path d="M16 4l4 4"/></svg>;
        const IconTrophy = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>;
        const IconGamepad = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="6" y1="12" x2="10" y2="12"/><line x1="8" y1="10" x2="8" y2="14"/><line x1="15" y1="13" x2="15.01" y2="13"/><line x1="18" y1="11" x2="18.01" y2="11"/><rect x="2" y="6" width="20" height="12" rx="2"/></svg>;

        // --- MATEMÁTICAS DIANA ---
        const polarToCartesian = (cx, cy, r, angleInDegrees) => {
            const angleInRadians = (angleInDegrees - 90) * Math.PI / 180.0;
            return { x: cx + r * Math.cos(angleInRadians), y: cy + r * Math.sin(angleInRadians) };
        };

        const describeArc = (x, y, innerRadius, outerRadius, startAngle, endAngle) => {
            const startOuter = polarToCartesian(x, y, outerRadius, endAngle);
            const endOuter = polarToCartesian(x, y, outerRadius, startAngle);
            const startInner = polarToCartesian(x, y, innerRadius, endAngle);
            const endInner = polarToCartesian(x, y, innerRadius, startAngle);
            const largeArcFlag = endAngle - startAngle <= 180 ? '0' : '1';
            return ['M', startOuter.x, startOuter.y, 'A', outerRadius, outerRadius, 0, largeArcFlag, 0, endOuter.x, endOuter.y, 'L', endInner.x, endInner.y, 'A', innerRadius, innerRadius, 0, largeArcFlag, 1, startInner.x, startInner.y, 'Z'].join(' ');
        };

        const SECTORS = [20, 1, 18, 4, 13, 6, 10, 15, 2, 17, 3, 19, 7, 16, 8, 11, 14, 9, 12, 5];
        const CRICKET_NUMBERS = [20, 19, 18, 17, 16, 15, 25];

        // --- APP ---
        function App() {
            const [appState, setAppState] = useState('setup_config');
            const [numPlayers, setNumPlayers] = useState(2);
            const [gameMode, setGameMode] = useState('cut_throat'); // cut_throat, normal_cricket, 301, 501, high_score
            const [players, setPlayers] = useState([]);
            const [tempNames, setTempNames] = useState(['', '']); 
            
            const [currentPlayerIdx, setCurrentPlayerIdx] = useState(0);
            const [currentTurnThrows, setCurrentTurnThrows] = useState([]);
            const [lastHit, setLastHit] = useState(null);
            const [winner, setWinner] = useState(null);
            const [round, setRound] = useState(1);
            
            // Estado visual para cuando un jugador se pasa de puntos en 301/501
            const [isBust, setIsBust] = useState(false);

            const GAME_MODES = {
                'cut_throat': { name: 'Cut Throat Cricket', desc: 'Suma a los rivales. Gana el que cierra todo y tiene MENOS puntos.' },
                'normal_cricket': { name: 'Cricket (Puntos)', desc: 'Suma para ti. Gana el que cierra todo y tiene MÁS puntos.' },
                '301': { name: '301', desc: 'Llega a 0 exacto. Si te pasas, haces BUST.' },
                '501': { name: '501', desc: 'El clásico de torneo. Llega a 0 exacto.' },
                'high_score': { name: 'High Score (7 Rondas)', desc: '7 Rondas. Todos los números valen. Gana el de MAYOR puntuación.' }
            };

            const handleGoToNames = () => {
                setTempNames(Array(numPlayers).fill(''));
                setAppState('setup_names');
            };

            const initPlayers = () => {
                const initialScore = (gameMode === '301') ? 301 : (gameMode === '501') ? 501 : 0;
                
                const newPlayers = tempNames.map((name, i) => ({
                    id: i,
                    name: name.trim() || `JUGADOR ${i + 1}`,
                    score: initialScore, 
                    previousRoundScore: initialScore, // Guarda el score al inicio de la ronda para el Bust
                    marks: { 20: 0, 19: 0, 18: 0, 17: 0, 16: 0, 15: 0, 25: 0 }
                }));
                setPlayers(newPlayers);
                setCurrentPlayerIdx(0);
                setCurrentTurnThrows([]);
                setLastHit(null);
                setWinner(null);
                setRound(1);
                setIsBust(false);
                setAppState('playing');
            };

            const handleHit = (sector, multiplier) => {
                if (currentTurnThrows.length >= 3 || winner || isBust) return;
                
                const isCricket = gameMode.includes('cricket');
                
                if (isCricket && !CRICKET_NUMBERS.includes(sector)) {
                    handleMiss();
                    return;
                }

                let points = sector * multiplier;
                if (sector === 25) points = multiplier === 1 ? 25 : 50;

                let text = `${sector}`;
                if (multiplier === 2) text = `Doble ${sector}`;
                if (multiplier === 3) text = `Triple ${sector}`;
                if (sector === 25 && multiplier === 1) text = `Outer Bull`;
                if (sector === 25 && multiplier === 2) text = `Centro (Bull)`;

                const throwData = { sector, multiplier, points, text };
                const newThrows = [...currentTurnThrows, throwData];
                setCurrentTurnThrows(newThrows);
                setLastHit(throwData);

                // Checkeo instantáneo de Bust o Victoria en X01
                if (gameMode === '301' || gameMode === '501') {
                    const currentPointsScored = newThrows.reduce((sum, t) => sum + t.points, 0);
                    const p = players[currentPlayerIdx];
                    const remaining = p.previousRoundScore - currentPointsScored;

                    if (remaining < 0 || remaining === 1) { // En juegos oficiales no puedes quedar con 1 porque se requiere Doble para acabar, aquí simplificamos a llegar a 0 exacto
                        setIsBust(true);
                    } else if (remaining === 0) {
                        // Victoria instantánea en X01!
                        let updatedP = [...players];
                        updatedP[currentPlayerIdx].score = 0;
                        setPlayers(updatedP);
                        setWinner(updatedP[currentPlayerIdx]);
                    }
                }
            };

            const handleMiss = () => {
                if (currentTurnThrows.length >= 3 || winner || isBust) return;
                const throwData = { sector: 0, multiplier: 0, points: 0, text: `Fallo (Fuera)` };
                setCurrentTurnThrows([...currentTurnThrows, throwData]);
                setLastHit(throwData);
            };

            const undoThrow = () => {
                if (currentTurnThrows.length > 0 && !winner) {
                    const newThrows = [...currentTurnThrows];
                    newThrows.pop();
                    setCurrentTurnThrows(newThrows);
                    setLastHit(newThrows.length > 0 ? newThrows[newThrows.length - 1] : null);
                    setIsBust(false); // Quitar el bust si deshacemos
                }
            };

            const checkWinnerCricket = (currentPlayers, isCutThroat) => {
                for (let i = 0; i < currentPlayers.length; i++) {
                    const p = currentPlayers[i];
                    let allClosed = CRICKET_NUMBERS.every(num => p.marks[num] >= 3);

                    if (allClosed) {
                        let hasWinningScore = true;
                        for (let j = 0; j < currentPlayers.length; j++) {
                            if (i !== j) {
                                if (isCutThroat && currentPlayers[j].score < p.score) hasWinningScore = false;
                                if (!isCutThroat && currentPlayers[j].score > p.score) hasWinningScore = false;
                            }
                        }
                        if (hasWinningScore) return p;
                    }
                }
                return null;
            };

            const endTurn = () => {
                if (currentTurnThrows.length < 3 && !isBust) return;

                let updatedPlayers = players.map(p => ({ ...p, marks: { ...p.marks } }));
                let currentP = updatedPlayers[currentPlayerIdx];
                const pointsScoredThisTurn = currentTurnThrows.reduce((sum, t) => sum + t.points, 0);

                // --- LÓGICA DE X01 (301/501) ---
                if (gameMode === '301' || gameMode === '501') {
                    if (isBust) {
                        // Vuelve a la puntuación de inicio de ronda
                        currentP.score = currentP.previousRoundScore;
                    } else {
                        currentP.score = currentP.previousRoundScore - pointsScoredThisTurn;
                        currentP.previousRoundScore = currentP.score;
                    }
                } 
                // --- LÓGICA DE HIGH SCORE ---
                else if (gameMode === 'high_score') {
                    currentP.score += pointsScoredThisTurn;
                }
                // --- LÓGICA DE CRICKET ---
                else {
                    const isCutThroat = gameMode === 'cut_throat';
                    
                    currentTurnThrows.forEach(t => {
                        const s = t.sector;
                        if (s !== 0 && currentP.marks[s] !== undefined) {
                            let marksNeededToClose = 3 - currentP.marks[s];
                            let marksScored = t.multiplier;

                            if (marksNeededToClose > 0) {
                                if (marksScored <= marksNeededToClose) {
                                    currentP.marks[s] += marksScored;
                                    marksScored = 0;
                                } else {
                                    currentP.marks[s] = 3;
                                    marksScored -= marksNeededToClose;
                                }
                            }

                            if (marksScored > 0) {
                                const pointsToDistribute = s * marksScored;
                                if (isCutThroat) {
                                    // Suma a rivales sin cerrar
                                    updatedPlayers.forEach((otherP, idx) => {
                                        if (idx !== currentPlayerIdx && otherP.marks[s] < 3) {
                                            otherP.score += pointsToDistribute;
                                        }
                                    });
                                } else {
                                    // Suma para mí mismo (Normal Cricket) si algún rival lo tiene abierto
                                    const anyRivalOpen = updatedPlayers.some((otherP, idx) => idx !== currentPlayerIdx && otherP.marks[s] < 3);
                                    if (anyRivalOpen) {
                                        currentP.score += pointsToDistribute;
                                    }
                                }
                            }
                        }
                    });
                }

                setPlayers(updatedPlayers);
                setCurrentTurnThrows([]);
                setLastHit(null);
                setIsBust(false);

                // --- COMPROBAR VICTORIA GLOBAL ---
                let possibleWinner = null;
                
                if (gameMode.includes('cricket')) {
                    possibleWinner = checkWinnerCricket(updatedPlayers, gameMode === 'cut_throat');
                } else if (gameMode === 'high_score') {
                    // Si todos han tirado en la ronda 7
                    if (currentPlayerIdx === players.length - 1 && round === 7) {
                        possibleWinner = [...updatedPlayers].sort((a, b) => b.score - a.score)[0];
                    }
                }

                if (possibleWinner) {
                    setWinner(possibleWinner);
                } else if (!winner) {
                    // Pasar turno y gestionar rondas
                    if (currentPlayerIdx === players.length - 1) {
                        setRound(r => r + 1);
                    }
                    setCurrentPlayerIdx((currentPlayerIdx + 1) % players.length);
                }
            };

            const renderConfig = () => (
                <div className="flex flex-col items-center justify-center min-h-screen p-4 relative">
                    <div className="absolute inset-0 opacity-20 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-cyan-900 via-slate-900 to-black pointer-events-none"></div>
                    <div className="z-10 w-full max-w-md bg-slate-900/90 p-8 rounded-3xl border border-cyan-500/30 shadow-[0_0_40px_rgba(6,182,212,0.15)]">
                        <div className="flex justify-center mb-6"><IconTarget size={80} className="text-cyan-400 drop-shadow-[0_0_15px_rgba(6,182,212,0.8)]" /></div>
                        <h1 className="text-4xl font-black text-center mb-8 tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-fuchsia-500">CYBER DARTS</h1>
                        
                        <div className="space-y-6">
                            <div>
                                <label className="block text-fuchsia-400 text-sm font-bold mb-2 uppercase flex items-center gap-2"><IconGamepad size={16}/> Juego</label>
                                <select value={gameMode} onChange={(e) => setGameMode(e.target.value)} className="w-full bg-slate-950 border-2 border-slate-700 text-white p-4 rounded-xl text-xl font-bold text-center appearance-none cursor-pointer focus:border-fuchsia-500 focus:outline-none">
                                    <option value="cut_throat">CUT THROAT CRICKET</option>
                                    <option value="normal_cricket">CRICKET (PUNTOS)</option>
                                    <option value="301">301</option>
                                    <option value="501">501</option>
                                    <option value="high_score">HIGH SCORE (7 Rondas)</option>
                                </select>
                                <p className="text-slate-400 text-xs mt-2 text-center h-8">{GAME_MODES[gameMode].desc}</p>
                            </div>

                            <div>
                                <label className="block text-cyan-400 text-sm font-bold mb-2 uppercase flex items-center gap-2"><IconUsers size={16}/> Jugadores</label>
                                <select value={numPlayers} onChange={(e) => setNumPlayers(Number(e.target.value))} className="w-full bg-slate-950 border-2 border-slate-700 text-white p-4 rounded-xl text-xl font-bold text-center cursor-pointer focus:border-cyan-500 focus:outline-none">
                                    {[1, 2, 3, 4, 5, 6].map(n => <option key={n} value={n}>{n} {n === 1 ? 'Jugador' : 'Jugadores'}</option>)}
                                </select>
                            </div>
                            <button onClick={handleGoToNames} className="w-full mt-4 bg-gradient-to-r from-cyan-500 to-blue-600 text-white font-black py-4 px-6 rounded-xl flex items-center justify-center gap-3 text-xl uppercase active:scale-95 transition-transform">
                                Siguiente <IconArrowRight size={24} />
                            </button>
                        </div>
                    </div>
                </div>
            );

            const renderNames = () => (
                <div className="flex flex-col items-center justify-center min-h-screen p-4 relative">
                    <div className="z-10 w-full max-w-md bg-slate-900/90 p-8 rounded-3xl border border-fuchsia-500/30 shadow-[0_0_40px_rgba(236,72,153,0.15)]">
                        <h2 className="text-3xl font-black text-center mb-6 text-fuchsia-400">NOMBRES</h2>
                        <div className="space-y-4 max-h-[60vh] overflow-y-auto pr-2 pb-2">
                            {tempNames.map((name, i) => (
                                <div key={i} className="relative">
                                    <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><IconUser size={20} className="text-slate-500" /></div>
                                    <input type="text" placeholder={`Jugador ${i + 1}`} value={name} onChange={(e) => {
                                        const newNames = [...tempNames];
                                        newNames[i] = e.target.value.toUpperCase();
                                        setTempNames(newNames);
                                    }} className="w-full bg-slate-950 border-2 border-slate-700 text-cyan-300 pl-12 pr-4 py-4 rounded-xl text-lg font-bold uppercase focus:border-fuchsia-500 focus:outline-none"/>
                                </div>
                            ))}
                        </div>
                        <div className="flex gap-4 mt-6">
                            <button onClick={() => setAppState('setup_config')} className="flex-1 bg-slate-800 text-white font-bold py-4 rounded-xl active:bg-slate-700">Atrás</button>
                            <button onClick={initPlayers} className="flex-[2] bg-gradient-to-r from-fuchsia-600 to-purple-600 text-white font-black py-4 rounded-xl flex items-center justify-center gap-2 text-lg uppercase active:scale-95 transition-transform shadow-[0_0_20px_rgba(236,72,153,0.4)]">
                                <IconPlay size={20} /> Iniciar
                            </button>
                        </div>
                    </div>
                </div>
            );

            const renderGame = () => {
                if (players.length === 0) return null;

                const cx = 170, cy = 170, maxR = 140; 
                const rInnerBull = 8, rOuterBull = 18, rInnerSingle = 70, rTreble = 85, rOuterSingle = 125, rDouble = maxR;
                const colors = { dark: '#0f172a', light: '#334155', double1: '#ec4899', double2: '#06b6d4', text: '#f8fafc' };
                const getColors = (index) => ({ single: index % 2 === 0 ? colors.dark : colors.light, ring: index % 2 === 0 ? colors.double1 : colors.double2 });

                const renderCricketMark = (count) => {
                    if (!count) return null;
                    if (count === 1) return <span className="text-2xl text-cyan-400 font-bold">/</span>;
                    if (count === 2) return <span className="text-2xl text-cyan-400 font-bold">X</span>;
                    return <div className="relative flex items-center justify-center"><span className="text-2xl text-fuchsia-400 font-bold">X</span><div className="absolute w-8 h-8 rounded-full border-2 border-fuchsia-400"></div></div>;
                };

                const currentPlayer = players[currentPlayerIdx];
                const isTurnComplete = currentTurnThrows.length === 3 || isBust;
                const isCricket = gameMode.includes('cricket');

                // Para visualización en vivo de score durante el turno en X01/High Score
                const currentTurnPoints = currentTurnThrows.reduce((sum, t) => sum + t.points, 0);
                const getLiveScore = (p, idx) => {
                    if (idx !== currentPlayerIdx) return p.score;
                    if (gameMode === 'high_score') return p.score + currentTurnPoints;
                    if (gameMode === '301' || gameMode === '501') return isBust ? p.previousRoundScore : (p.previousRoundScore - currentTurnPoints);
                    return p.score; // Cricket se actualiza al final del turno
                };

                return (
                    <div className="flex flex-col md:flex-row min-h-screen md:h-screen w-full bg-slate-950 p-2 md:p-4 gap-4 text-white relative">
                        
                        {/* OVERLAY DE VICTORIA */}
                        {winner && (
                            <div className="absolute inset-0 z-50 bg-black/90 backdrop-blur-md flex flex-col items-center justify-center p-4">
                                <IconTrophy size={120} className="text-yellow-400 drop-shadow-[0_0_40px_rgba(250,204,21,0.8)] mb-6 animate-bounce" />
                                <h1 className="text-5xl md:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-yellow-600 text-center mb-4 uppercase">
                                    ¡{winner.name} GANA!
                                </h1>
                                {gameMode !== '301' && gameMode !== '501' && (
                                    <p className="text-3xl text-slate-300 mb-12 font-black border-2 border-yellow-500/50 p-4 rounded-2xl bg-yellow-900/20">{winner.score} pts</p>
                                )}
                                
                                <div className="flex gap-4">
                                    <button onClick={initPlayers} className="bg-slate-800 hover:bg-slate-700 text-white font-bold py-4 px-8 rounded-xl transition-colors text-xl">Revancha</button>
                                    <button onClick={() => setAppState('setup_config')} className="bg-gradient-to-r from-cyan-500 to-blue-600 text-white font-black py-4 px-8 rounded-xl shadow-[0_0_20px_rgba(6,182,212,0.4)] transition-transform active:scale-95 text-xl">Nuevo Juego</button>
                                </div>
                            </div>
                        )}

                        {/* CONTENEDOR DIANA */}
                        <div className="w-full md:flex-1 md:max-w-[45%] flex items-center justify-center bg-slate-900 rounded-3xl border border-slate-800 p-2 min-h-[40vh] md:h-full relative overflow-hidden shrink-0">
                            <div className="absolute inset-0 opacity-5" style={{ backgroundImage: 'linear-gradient(#334155 1px, transparent 1px), linear-gradient(90deg, #334155 1px, transparent 1px)', backgroundSize: '20px 20px'}}></div>
                            <svg viewBox="0 0 340 340" className="w-full h-full max-h-[45vh] md:max-h-[95vh] drop-shadow-[0_0_20px_rgba(0,0,0,1)] z-10" style={{ touchAction: 'none' }}>
                                <circle cx={cx} cy={cy} r={maxR + 25} fill="#020617" />
                                {SECTORS.map((sector, i) => {
                                    const startAngle = i * 18 - 9, endAngle = i * 18 + 9, textAngle = i * 18;
                                    const textPos = polarToCartesian(cx, cy, maxR + 15, textAngle);
                                    const { single, ring } = getColors(i);
                                    
                                    // Atenuar números no válidos en Cricket
                                    const isValidTarget = !isCricket || CRICKET_NUMBERS.includes(sector);
                                    const textColor = isValidTarget ? colors.text : '#475569';
                                    const fw = isValidTarget ? "900" : "500";

                                    return (
                                        <g key={`sector-${sector}`}>
                                            <path d={describeArc(cx, cy, rTreble, rOuterSingle, startAngle, endAngle)} fill={single} stroke="#1e293b" strokeWidth="0.5" onClick={() => handleHit(sector, 1)} />
                                            <path d={describeArc(cx, cy, rOuterBull, rInnerSingle, startAngle, endAngle)} fill={single} stroke="#1e293b" strokeWidth="0.5" onClick={() => handleHit(sector, 1)} />
                                            <path d={describeArc(cx, cy, rOuterSingle, rDouble, startAngle, endAngle)} fill={ring} stroke="#0f172a" strokeWidth="1" onClick={() => handleHit(sector, 2)} />
                                            <path d={describeArc(cx, cy, rInnerSingle, rTreble, startAngle, endAngle)} fill={ring} stroke="#0f172a" strokeWidth="1" onClick={() => handleHit(sector, 3)} />
                                            <text x={textPos.x} y={textPos.y} fontSize="16" fill={textColor} textAnchor="middle" dominantBaseline="middle" fontWeight={fw}>{sector}</text>
                                        </g>
                                    );
                                })}
                                <circle cx={cx} cy={cy} r={rOuterBull} fill={colors.double2} stroke="#0f172a" strokeWidth="1" onClick={() => handleHit(25, 1)} />
                                <circle cx={cx} cy={cy} r={rInnerBull} fill={colors.double1} stroke="#0f172a" strokeWidth="1" onClick={() => handleHit(25, 2)} />
                            </svg>
                        </div>

                        {/* CONTENEDOR MARCADOR Y CONTROLES */}
                        <div className="flex-1 flex flex-col gap-4 pb-4 md:pb-0 md:h-full">
                            
                            {/* PANEL DE CONTROL SUPERIOR */}
                            <div className={`bg-slate-900 border ${isBust ? 'border-red-500 shadow-[0_0_30px_rgba(239,68,68,0.2)]' : 'border-slate-800 shadow-lg'} p-4 md:p-6 rounded-3xl flex flex-col justify-between shrink-0 transition-colors`}>
                                <div className="flex justify-between items-center mb-6">
                                    <div className="flex-1 overflow-hidden">
                                        <span className="text-slate-400 text-xs uppercase font-bold tracking-widest">
                                            Turno de {gameMode === 'high_score' && <span className="text-fuchsia-400 ml-2">- Ronda {round}/7</span>}
                                        </span>
                                        <h3 className="text-3xl md:text-4xl font-black text-cyan-400 truncate">{currentPlayer.name}</h3>
                                    </div>
                                    <div className="flex gap-2">
                                        {[0, 1, 2].map(i => {
                                            const isThrown = i < currentTurnThrows.length;
                                            return <div key={i} className={`w-12 h-12 md:w-14 md:h-14 rounded-full flex items-center justify-center border-2 ${isThrown ? (isBust ? 'border-red-500 bg-red-500/20' : 'border-fuchsia-500 bg-fuchsia-500/20 shadow-[0_0_15px_rgba(236,72,153,0.5)]') : 'border-slate-700 bg-slate-800'}`}><IconDart size={20} className={isThrown ? (isBust ? 'text-red-400' : 'text-fuchsia-400') : 'text-slate-600'} /></div>;
                                        })}
                                    </div>
                                </div>

                                <div className="flex flex-col gap-2 md:gap-3">
                                    <div className="flex gap-2 md:gap-3">
                                        <div className={`flex-[2] bg-slate-950 border ${isBust ? 'border-red-500/50' : 'border-slate-800'} rounded-xl p-2 md:p-3 flex items-center justify-center h-14 md:h-16 relative overflow-hidden`}>
                                            {isBust ? (
                                                <span className="text-2xl font-black text-red-500 animate-pulse">¡BUST! (Te pasaste)</span>
                                            ) : lastHit ? (
                                                <span className="text-lg md:text-2xl font-black text-white z-10">{lastHit.text}</span>
                                            ) : (
                                                <span className="text-slate-600 font-bold text-xs md:text-sm z-10">Toca la diana</span>
                                            )}
                                        </div>
                                        <button onClick={handleMiss} disabled={isTurnComplete || winner} className="flex-1 h-14 md:h-16 rounded-xl bg-red-900/20 text-red-400 border border-red-900/50 font-bold flex items-center justify-center disabled:opacity-30 active:bg-red-900/40 transition-colors">
                                            Fallo
                                        </button>
                                    </div>
                                    <div className="flex gap-2 md:gap-3">
                                        <button onClick={undoThrow} disabled={currentTurnThrows.length === 0 || winner} className="h-14 md:h-16 flex-1 rounded-xl bg-slate-800 text-slate-300 font-bold flex gap-2 disabled:opacity-30 active:bg-slate-700 items-center justify-center transition-colors">
                                            <IconUndo size={20} /> <span className="hidden sm:inline">Deshacer</span>
                                        </button>
                                        <button onClick={endTurn} disabled={!isTurnComplete || winner} className={`h-14 md:h-16 flex-[2] rounded-xl font-black flex items-center justify-center gap-2 transition-all ${isTurnComplete && !winner ? 'bg-gradient-to-r from-cyan-500 to-blue-600 text-white animate-pulse shadow-[0_0_15px_rgba(6,182,212,0.4)]' : 'bg-slate-800 text-slate-500 opacity-50 cursor-not-allowed'}`}>
                                            Siguiente Jugador <IconArrowRight size={20} />
                                        </button>
                                    </div>
                                </div>
                            </div>

                            {/* TABLA DE PUNTUACIONES (Adaptable) */}
                            <div className="flex-1 bg-slate-900 border border-slate-800 rounded-3xl overflow-hidden flex flex-col shadow-lg">
                                <div className="p-3 bg-slate-950 border-b border-slate-800 flex justify-between items-center">
                                    <h2 className="text-sm font-black text-fuchsia-400 uppercase tracking-widest">{GAME_MODES[gameMode].name}</h2>
                                    {!isCricket && <span className="text-xs font-bold text-slate-500 bg-slate-800 px-3 py-1 rounded-full">Pts en ronda: +{currentTurnPoints}</span>}
                                </div>
                                
                                <div className="flex-1 overflow-x-auto overflow-y-auto p-4 flex flex-col">
                                    
                                    {/* MODO NO-CRICKET (301, 501, High Score) */}
                                    {!isCricket && (
                                        <div className="grid grid-cols-2 gap-4 h-full">
                                            {players.map((p, i) => (
                                                <div key={p.id} className={`bg-slate-950 rounded-2xl border-2 flex flex-col items-center justify-center p-4 ${i === currentPlayerIdx ? 'border-cyan-500 shadow-[0_0_20px_rgba(6,182,212,0.2)]' : 'border-slate-800'}`}>
                                                    <span className={`text-sm font-bold uppercase tracking-widest mb-2 ${i === currentPlayerIdx ? 'text-cyan-400' : 'text-slate-500'}`}>{p.name}</span>
                                                    <span className={`text-5xl md:text-6xl font-black ${i === currentPlayerIdx ? 'text-white' : 'text-slate-400'}`}>
                                                        {getLiveScore(p, i)}
                                                    </span>
                                                </div>
                                            ))}
                                        </div>
                                    )}

                                    {/* MODO CRICKET */}
                                    {isCricket && (
                                        <table className="w-full text-center border-collapse min-w-[300px]">
                                            <thead className="sticky top-0 bg-slate-900 z-10 shadow-sm border-b border-slate-700">
                                                <tr>
                                                    <th className="p-2 border-r border-slate-700 text-slate-500 w-16 text-sm bg-slate-900">Num</th>
                                                    {players.map((p, i) => <th key={p.id} className={`p-2 border-r border-slate-700 ${i === currentPlayerIdx ? 'text-cyan-400' : 'text-white'} font-black text-base md:text-lg truncate max-w-[80px] bg-slate-900`}>{p.name.substring(0,6)}</th>)}
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <tr className="bg-slate-950/80 border-b-2 border-cyan-900">
                                                    <td className="p-2 border-r border-slate-800 font-bold text-xs text-fuchsia-400 uppercase tracking-widest">PTS</td>
                                                    {players.map(p => <td key={`score-${p.id}`} className="p-2 border-r border-slate-800 h-10 md:h-12 font-black text-xl md:text-2xl text-white">{p.score}</td>)}
                                                </tr>
                                                {CRICKET_NUMBERS.map(num => (
                                                    <tr key={num} className="hover:bg-slate-800/50">
                                                        <td className="p-2 border-b border-r border-slate-800 font-black text-lg md:text-xl text-slate-300 bg-slate-950/50">{num === 25 ? 'B' : num}</td>
                                                        {players.map(p => <td key={`${p.id}-${num}`} className="p-2 border-b border-r border-slate-800 h-10 md:h-12 relative">{renderCricketMark(p.marks[num])}</td>)}
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            return <div className="min-h-screen w-full text-white selection:bg-cyan-500 selection:text-white bg-slate-950">{appState === 'setup_config' && renderConfig()}{appState === 'setup_names' && renderNames()}{appState === 'playing' && renderGame()}</div>;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
