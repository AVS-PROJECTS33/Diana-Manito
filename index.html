<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Manito's Darts</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- MÓDULOS DE FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.fb = {
            initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged,
            getFirestore, doc, setDoc, onSnapshot, collection
        };
    </script>

    <style>
        body, html {
            background-color: #020617; 
            user-select: none; 
            -webkit-user-select: none;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden !important; 
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
            touch-action: none;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(6, 182, 212, 0.5); border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root" class="w-full h-full"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICONOS ---
        const IconTarget = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>;
        const IconUsers = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
        const IconUser = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
        const IconPlay = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="currentColor" className={className}><polygon points="5 3 19 12 5 21 5 3"/></svg>;
        const IconArrowRight = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>;
        const IconUndo = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>;
        const IconDart = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="22" y1="2" x2="15" y2="9"/><line x1="10" y1="14" x2="2" y2="22"/><line x1="14" y1="10" x2="10" y2="14"/><path d="M15 9l4 4"/><path d="M22 2l-4-4"/><path d="M16 4l4 4"/></svg>;
        const IconTrophy = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>;
        const IconGamepad = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="6" y1="12" x2="10" y2="12"/><line x1="8" y1="10" x2="8" y2="14"/><line x1="15" y1="13" x2="15.01" y2="13"/><line x1="18" y1="11" x2="18.01" y2="11"/><rect x="2" y="6" width="20" height="12" rx="2"/></svg>;
        const IconList = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>;
        const IconPower = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>;
        const IconQrCode = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="6" height="6" rx="1"/><rect x="15" y="3" width="6" height="6" rx="1"/><rect x="3" y="15" width="6" height="6" rx="1"/><path d="M21 15v6"/><path d="M15 21h6"/><path d="M15 15h6"/><path d="M7 7h2"/><path d="M19 7h2"/><path d="M7 19h2"/></svg>;

        // --- MATEMÁTICAS DIANA ---
        const polarToCartesian = (cx, cy, r, angleInDegrees) => {
            const angleInRadians = (angleInDegrees - 90) * Math.PI / 180.0;
            return { x: cx + r * Math.cos(angleInRadians), y: cy + r * Math.sin(angleInRadians) };
        };

        const describeArc = (x, y, innerRadius, outerRadius, startAngle, endAngle) => {
            const startOuter = polarToCartesian(x, y, outerRadius, endAngle);
            const endOuter = polarToCartesian(x, y, outerRadius, startAngle);
            const startInner = polarToCartesian(x, y, innerRadius, endAngle);
            const endInner = polarToCartesian(x, y, innerRadius, startAngle);
            const largeArcFlag = endAngle - startAngle <= 180 ? '0' : '1';
            return ['M', startOuter.x, startOuter.y, 'A', outerRadius, outerRadius, 0, largeArcFlag, 0, endOuter.x, endOuter.y, 'L', endInner.x, endInner.y, 'A', innerRadius, innerRadius, 0, largeArcFlag, 1, startInner.x, startInner.y, 'Z'].join(' ');
        };

        const SECTORS = [20, 1, 18, 4, 13, 6, 10, 15, 2, 17, 3, 19, 7, 16, 8, 11, 14, 9, 12, 5];
        const CRICKET_NUMBERS = [20, 19, 18, 17, 16, 15, 25];

        const GAME_MODES = {
            'cut_throat': { name: 'Cricket Inverso', desc: 'Cerrar del 15 al 20. Dar a un cerrado SUMA PUNTOS AL RIVAL. Gana el que cierra todo con menos puntos.' },
            'normal_cricket': { name: 'Cricket (Puntos)', desc: 'Cerrar del 15 al 20. Dar a un cerrado TE SUMA PUNTOS. Gana el que cierra todo con más puntos.' },
            'no_score_cricket': { name: 'Cricket (Sin Puntos)', desc: 'El más rápido. Cerrar del 15 al 20 y Bull. No hay puntos, gana el primero en cerrar.' },
            '301': { name: '301', desc: 'Llega a 0 exacto. Si te pasas, haces BUST.' },
            '501': { name: '501', desc: 'Llega a 0 exacto. Clásico de torneo.' },
            '701': { name: '701', desc: 'Llega a 0 exacto. Partida media/larga.' },
            '901': { name: '901', desc: 'Llega a 0 exacto. Partida masiva (Ideal equipos).' },
            'high_score': { name: 'High Score', desc: '7 Rondas. Todos los números valen. Gana el de MAYOR puntuación.' },
            'around_the_clock': { name: 'Reloj (1 al 20)', desc: 'Acertar del 1 al 20 en orden consecutivo. Gana el primero que llega y acierta al 20.' }
        };

        function App() {
            // --- FIREBASE INITIALIZATION ---
            const [fbLoaded, setFbLoaded] = useState(false);
            const [firebaseDb, setFirebaseDb] = useState(null);
            const [firebaseAuth, setFirebaseAuth] = useState(null);
            const [user, setUser] = useState(null);

            useEffect(() => {
                const checkFb = setInterval(() => {
                    if (window.fb) {
                        setFbLoaded(true);
                        clearInterval(checkFb);
                        
                        try {
                            const firebaseConfig = typeof __firebase_config !== 'undefined'
                                ? JSON.parse(__firebase_config)
                                : {
                                    apiKey: "AIzaSyB0qANx0EICZiBp1wVo4DSzSLNbZlwiR7M",
                                    authDomain: "manitos-darts.firebaseapp.com",
                                    projectId: "manitos-darts",
                                    storageBucket: "manitos-darts.firebasestorage.app",
                                    messagingSenderId: "570426204253",
                                    appId: "1:570426204253:web:e7772abc0d2410638e6db4",
                                    measurementId: "G-0XZ3S9D9Q5"
                                };

                            const app = window.fb.initializeApp(firebaseConfig);
                            const auth = window.fb.getAuth(app);
                            setFirebaseAuth(auth);
                            setFirebaseDb(window.fb.getFirestore(app));

                            const initAuth = async () => {
                                try {
                                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                        await window.fb.signInWithCustomToken(auth, __initial_auth_token);
                                    } else {
                                        await window.fb.signInAnonymously(auth);
                                    }
                                } catch(e) { console.error("Error Auth:", e); }
                            };
                            initAuth();

                            window.fb.onAuthStateChanged(auth, setUser);

                        } catch(e) { console.warn("Firebase no configurado correctamente.", e); }
                    }
                }, 50);
                return () => clearInterval(checkFb);
            }, []);

            // --- ESTADO ÚNICO DEL JUEGO ---
            const [gameState, setGameState] = useState({
                appState: 'home', 
                gameMode: 'cut_throat',
                numPlayers: 2,
                players: [],
                activeTab: 'board',
                currentPlayerIdx: 0,
                currentTurnThrows: [],
                lastHit: null,
                winner: null,
                round: 1,
                isBust: false,
                pendingConfirmation: false 
            });

            // Estados Locales
            const [isOnline, setIsOnline] = useState(false);
            const [roomId, setRoomId] = useState(null);
            const [localPlayerId, setLocalPlayerId] = useState(null); 
            const [joinedViaUrl, setJoinedViaUrl] = useState(false); 
            const [tempNames, setTempNames] = useState(['', '']); 
            const [showExitConfirm, setShowExitConfirm] = useState(false);
            const [showQR, setShowQR] = useState(false);

            // --- SINCRONIZACIÓN CON FIREBASE ---
            useEffect(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const room = urlParams.get('room');
                
                if (room && user) {
                    setIsOnline(true);
                    setRoomId(room.toUpperCase());
                    setJoinedViaUrl(true);
                }
            }, [user]);

            useEffect(() => {
                if (!isOnline || !roomId || !firebaseDb || !user) return;
                
                const canvasAppId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                const roomRef = typeof __firebase_config !== 'undefined'
                    ? window.fb.doc(firebaseDb, 'artifacts', canvasAppId, 'public', 'data', 'rooms', roomId)
                    : window.fb.doc(firebaseDb, 'rooms', roomId);

                const unsub = window.fb.onSnapshot(roomRef, (snap) => {
                    if (snap.exists()) {
                        setGameState(prev => ({ ...prev, ...snap.data() }));
                    }
                }, (err) => console.error("Error Sync:", err));

                return () => unsub();
            }, [isOnline, roomId, firebaseDb, user]);

            const updateGame = (updates) => {
                setGameState(prev => {
                    const next = { ...prev, ...updates };
                    if (isOnline && roomId && firebaseDb && user) {
                        const canvasAppId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                        const roomRef = typeof __firebase_config !== 'undefined'
                            ? window.fb.doc(firebaseDb, 'artifacts', canvasAppId, 'public', 'data', 'rooms', roomId)
                            : window.fb.doc(firebaseDb, 'rooms', roomId);
                        
                        window.fb.setDoc(roomRef, next, { merge: true }).catch(e => console.error(e));
                    }
                    return next;
                });
            };

            const getDynamicGridClass = (totalItems) => {
                if (totalItems <= 3) return `grid-cols-${totalItems} grid-rows-1`;
                if (totalItems === 4) return 'grid-cols-2 grid-rows-2';
                return 'grid-cols-3 grid-rows-2'; 
            };

            const generateSafeQRUrl = () => {
                const baseUrl = window.location.href.split('?')[0];
                return `${baseUrl}?room=${roomId}`;
            };

            // --- LÓGICA DEL JUEGO ---
            const { appState, gameMode, numPlayers, players, activeTab, currentPlayerIdx, currentTurnThrows, lastHit, winner, round, isBust, pendingConfirmation } = gameState;

            const handleCreateRoom = () => {
                const id = Math.random().toString(36).substring(2, 6).toUpperCase();
                setRoomId(id);
                setIsOnline(true);
                updateGame({ appState: 'setup_config' });
            };

            const handleGoToNames = () => {
                setTempNames(Array(numPlayers).fill(''));
                updateGame({ appState: 'setup_names' });
            };

            const initPlayers = () => {
                const initialScore = ['301', '501', '701', '901'].includes(gameMode) ? parseInt(gameMode) : 
                                     (gameMode === 'around_the_clock' ? 1 : 0);
                
                const newPlayers = tempNames.map((name, i) => ({
                    id: i,
                    name: name.trim() || `Jugador ${i + 1}`,
                    score: initialScore, 
                    previousRoundScore: initialScore,
                    marks: { 20: 0, 19: 0, 18: 0, 17: 0, 16: 0, 15: 0, 25: 0 }
                }));
                
                updateGame({
                    players: newPlayers,
                    currentPlayerIdx: 0,
                    currentTurnThrows: [],
                    lastHit: null,
                    winner: null,
                    round: 1,
                    isBust: false,
                    activeTab: 'board',
                    pendingConfirmation: false,
                    appState: isOnline ? 'setup_qr' : 'playing'
                });
                setShowExitConfirm(false);
            };

            const isActionAllowed = () => {
                if (!joinedViaUrl) return true; // Tablet Host puede hacer todo
                return localPlayerId === currentPlayerIdx; // El móvil solo puede accionar en su turno
            };

            const handleHit = (sector, multiplier) => {
                if (!isActionAllowed()) return;
                if (currentTurnThrows.length >= 3 || winner || isBust || pendingConfirmation) return;
                
                const isCricket = ['cut_throat', 'normal_cricket', 'no_score_cricket'].includes(gameMode);
                if (isCricket && !CRICKET_NUMBERS.includes(sector)) {
                    handleMiss();
                    return;
                }

                let points = sector * multiplier;
                if (sector === 25) points = multiplier === 1 ? 25 : 50;

                let text = `${sector}`;
                if (multiplier === 2) text = `Doble ${sector}`;
                if (multiplier === 3) text = `Triple ${sector}`;
                if (sector === 25 && multiplier === 1) text = `Outer Bull`;
                if (sector === 25 && multiplier === 2) text = `Centro (Bull)`;

                const throwData = { sector, multiplier, points, text };
                const newThrows = [...currentTurnThrows, throwData];
                
                let newIsBust = isBust;
                let newWinner = winner;
                let newPlayers = [...players];

                if (['301', '501', '701', '901'].includes(gameMode)) {
                    const currentPointsScored = newThrows.reduce((sum, t) => sum + t.points, 0);
                    const remaining = newPlayers[currentPlayerIdx].previousRoundScore - currentPointsScored;

                    if (remaining < 0 || remaining === 1) { 
                        newIsBust = true;
                    } else if (remaining === 0) {
                        newPlayers[currentPlayerIdx].score = 0;
                        newWinner = newPlayers[currentPlayerIdx];
                    }
                } else if (gameMode === 'around_the_clock') {
                    let currentTarget = newPlayers[currentPlayerIdx].score;
                    newThrows.forEach(t => {
                        if (t.sector === currentTarget) currentTarget++;
                    });
                    if (currentTarget > 20) {
                        newPlayers[currentPlayerIdx].score = currentTarget;
                        newWinner = newPlayers[currentPlayerIdx];
                    }
                }

                updateGame({
                    currentTurnThrows: newThrows,
                    lastHit: throwData,
                    isBust: newIsBust,
                    winner: newWinner,
                    players: newPlayers
                });
            };

            const handleMiss = () => {
                if (!isActionAllowed()) return;
                if (currentTurnThrows.length >= 3 || winner || isBust || pendingConfirmation) return;
                const throwData = { sector: 0, multiplier: 0, points: 0, text: `Fallo (Fuera)` };
                updateGame({
                    currentTurnThrows: [...currentTurnThrows, throwData],
                    lastHit: throwData
                });
            };

            const undoThrow = () => {
                if (!isActionAllowed()) return;
                if (currentTurnThrows.length > 0 && !winner && !pendingConfirmation) {
                    const newThrows = [...currentTurnThrows];
                    newThrows.pop();
                    updateGame({
                        currentTurnThrows: newThrows,
                        lastHit: newThrows.length > 0 ? newThrows[newThrows.length - 1] : null,
                        isBust: false
                    });
                }
            };

            const requestTurnConfirmation = () => {
                if (!isActionAllowed()) return;
                if (currentTurnThrows.length < 3 && !isBust) return;

                if (isOnline && joinedViaUrl) {
                    updateGame({ pendingConfirmation: true });
                } else {
                    endTurn(); 
                }
            };

            const checkWinnerCricket = (currentPlayers, mode) => {
                for (let i = 0; i < currentPlayers.length; i++) {
                    const p = currentPlayers[i];
                    let allClosed = CRICKET_NUMBERS.every(num => p.marks[num] >= 3);

                    if (allClosed) {
                        if (mode === 'no_score_cricket') return p;
                        
                        let hasWinningScore = true;
                        for (let j = 0; j < currentPlayers.length; j++) {
                            if (i !== j) {
                                if (mode === 'cut_throat' && currentPlayers[j].score < p.score) hasWinningScore = false;
                                if (mode === 'normal_cricket' && currentPlayers[j].score > p.score) hasWinningScore = false;
                            }
                        }
                        if (hasWinningScore) return p;
                    }
                }
                return null;
            };

            const endTurn = () => {
                if (currentTurnThrows.length < 3 && !isBust) return;

                let updatedPlayers = players.map(p => ({ ...p, marks: { ...p.marks } }));
                let currentP = updatedPlayers[currentPlayerIdx];
                const pointsScoredThisTurn = currentTurnThrows.reduce((sum, t) => sum + t.points, 0);

                if (['301', '501', '701', '901'].includes(gameMode)) {
                    if (isBust) {
                        currentP.score = currentP.previousRoundScore;
                    } else {
                        currentP.score = currentP.previousRoundScore - pointsScoredThisTurn;
                        currentP.previousRoundScore = currentP.score;
                    }
                } 
                else if (gameMode === 'high_score') {
                    currentP.score += pointsScoredThisTurn;
                }
                else if (gameMode === 'around_the_clock') {
                    currentTurnThrows.forEach(t => {
                        if (t.sector === currentP.score) currentP.score += 1;
                    });
                }
                else {
                    const isCutThroat = gameMode === 'cut_throat';
                    const isNoScore = gameMode === 'no_score_cricket';
                    
                    currentTurnThrows.forEach(t => {
                        const s = t.sector;
                        if (s !== 0 && currentP.marks[s] !== undefined) {
                            let marksNeededToClose = 3 - currentP.marks[s];
                            let marksScored = t.multiplier;

                            if (marksNeededToClose > 0) {
                                if (marksScored <= marksNeededToClose) {
                                    currentP.marks[s] += marksScored;
                                    marksScored = 0;
                                } else {
                                    currentP.marks[s] = 3;
                                    marksScored -= marksNeededToClose;
                                }
                            }

                            if (marksScored > 0 && !isNoScore) {
                                const pointsToDistribute = s * marksScored;
                                if (isCutThroat) {
                                    updatedPlayers.forEach((otherP, idx) => {
                                        if (idx !== currentPlayerIdx && otherP.marks[s] < 3) {
                                            otherP.score += pointsToDistribute;
                                        }
                                    });
                                } else { 
                                    const anyRivalOpen = updatedPlayers.some((otherP, idx) => idx !== currentPlayerIdx && otherP.marks[s] < 3);
                                    if (anyRivalOpen) {
                                        currentP.score += pointsToDistribute;
                                    }
                                }
                            }
                        }
                    });
                }

                let possibleWinner = null;
                if (['cut_throat', 'normal_cricket', 'no_score_cricket'].includes(gameMode)) {
                    possibleWinner = checkWinnerCricket(updatedPlayers, gameMode);
                } else if (gameMode === 'high_score') {
                    if (currentPlayerIdx === players.length - 1 && round === 7) {
                        possibleWinner = [...updatedPlayers].sort((a, b) => b.score - a.score)[0];
                    }
                }

                let nextPlayerIdx = currentPlayerIdx;
                let nextRound = round;

                if (!possibleWinner && !winner) {
                    if (currentPlayerIdx === players.length - 1) nextRound++;
                    nextPlayerIdx = (currentPlayerIdx + 1) % players.length;
                }

                updateGame({
                    players: updatedPlayers,
                    currentTurnThrows: [],
                    lastHit: null,
                    isBust: false,
                    pendingConfirmation: false,
                    winner: possibleWinner || winner,
                    currentPlayerIdx: nextPlayerIdx,
                    round: nextRound,
                    activeTab: 'board'
                });
            };

            const resetGame = () => {
                updateGame({ appState: 'home' });
                setIsOnline(false);
                setRoomId(null);
            };

            // --- VISTAS ---

            if (!fbLoaded) return <div className="h-screen w-full flex items-center justify-center bg-slate-950 text-cyan-400 font-bold tracking-widest uppercase">Inicializando Sistema...</div>;

            const renderHome = () => (
                <div className="flex-1 flex flex-col items-center justify-center p-4 relative z-10">
                    <div className="z-10 w-full max-w-lg bg-slate-900/80 backdrop-blur-xl p-8 rounded-3xl border border-cyan-500/30 shadow-[0_0_50px_rgba(6,182,212,0.2)] flex flex-col text-center">

                                        <div className="absolute inset-0 opacity-10" style={{ backgroundImage: 'linear-gradient(#334155 1px, transparent 1px), linear-gradient(90deg, #334155 1px, transparent 1px)', backgroundSize: '20px 20px'}}></div>
                                        <svg viewBox="0 0 340 340" className="w-full h-full object-contain drop-shadow-[0_0_30px_rgba(0,0,0,0.8)] z-10" style={{ touchAction: 'none' }}>
                                            <circle cx={cx} cy={cy} r={maxR + 25} fill="#020617" />
                                            {SECTORS.map((sector, i) => {
                                                const startAngle = i * 18 - 9, endAngle = i * 18 + 9, textAngle = i * 18;
                                                const textPos = polarToCartesian(cx, cy, maxR + 15, textAngle);
                                                const { single, ring } = getColors(i);
                                                
                                                let isValidTarget = true;
                                                if (isCricket) isValidTarget = CRICKET_NUMBERS.includes(sector);
                                                if (gameMode === 'around_the_clock') isValidTarget = sector === currentATCTarget;

                                                return (
                                                    <g key={`sector-${sector}`}>
                                                        <path d={describeArc(cx, cy, rTreble, rOuterSingle, startAngle, endAngle)} fill={single} stroke="#1e293b" strokeWidth="0.5" onClick={() => handleHit(sector, 1)} />
                                                        <path d={describeArc(cx, cy, rOuterBull, rInnerSingle, startAngle, endAngle)} fill={single} stroke="#1e293b" strokeWidth="0.5" onClick={() => handleHit(sector, 1)} />
                                                        <path d={describeArc(cx, cy, rOuterSingle, rDouble, startAngle, endAngle)} fill={ring} stroke="#0f172a" strokeWidth="1" onClick={() => handleHit(sector, 2)} />
                                                        <path d={describeArc(cx, cy, rInnerSingle, rTreble, startAngle, endAngle)} fill={ring} stroke="#0f172a" strokeWidth="1" onClick={() => handleHit(sector, 3)} />
                                                        <text x={textPos.x} y={textPos.y} fontSize="16" fill={isValidTarget ? (gameMode === 'around_the_clock' ? '#f472b6' : colors.text) : '#334155'} textAnchor="middle" dominantBaseline="middle" fontWeight={isValidTarget ? "900" : "500"} className={isValidTarget && gameMode === 'around_the_clock' ? 'animate-pulse' : ''}>{sector}</text>
                                                    </g>
                                                );
                                            })}
                                            <circle cx={cx} cy={cy} r={rOuterBull} fill={colors.double2} stroke="#0f172a" strokeWidth="1" onClick={() => handleHit(25, 1)} />
                                            <circle cx={cx} cy={cy} r={rInnerBull} fill={colors.double1} stroke="#0f172a" strokeWidth="1" onClick={() => handleHit(25, 2)} />
                                        </svg>
                                    </div>

                                    <div className={`order-1 md:order-2 ${joinedViaUrl ? 'flex-none shrink-0' : 'flex-[3] md:flex-[2] h-full'} flex flex-col gap-2 min-h-0`}>
                                        
                                        <div className={`bg-slate-900/80 backdrop-blur-md border ${isBust ? 'border-red-500 shadow-[0_0_30px_rgba(239,68,68,0.4)]' : 'border-slate-700/50 shadow-[0_0_20px_rgba(0,0,0,0.4)]'} p-1.5 md:p-3 rounded-2xl flex flex-col shrink-0 transition-colors`}>
                                            <div className="flex justify-between items-center mb-0.5 md:mb-2">
                                                <div className="flex-1 min-w-0">
                                                    <span className="text-slate-300 text-[8px] md:text-xs uppercase font-bold tracking-widest block mb-0 md:mb-1 drop-shadow-md">
                                                        Turno de {gameMode === 'high_score' && <span className="text-fuchsia-400">- R{round}/7</span>}
                                                    </span>
                                                    <h3 className="text-base md:text-3xl font-black text-cyan-400 truncate leading-tight drop-shadow-[0_0_10px_rgba(6,182,212,0.5)]">{currentPlayer.name}</h3>
                                                </div>
                                                <div className="flex gap-1 md:gap-2 shrink-0 ml-1 md:ml-2">
                                                    {[0, 1, 2].map(i => {
                                                        const isThrown = i < currentTurnThrows.length;
                                                        return <div key={i} className={`w-6 h-6 md:w-12 md:h-12 rounded-full flex items-center justify-center border-2 transition-all ${isThrown ? (isBust ? 'border-red-500 bg-red-500/30 shadow-[0_0_10px_rgba(239,68,68,0.5)]' : 'border-fuchsia-500 bg-fuchsia-500/30 shadow-[0_0_10px_rgba(236,72,153,0.5)]') : 'border-slate-700/50 bg-slate-800/50'}`}><IconDart size={14} className={isThrown ? (isBust ? 'text-red-400' : 'text-fuchsia-400') : 'text-slate-500'} /></div>;
                                                    })}
                                                </div>
                                            </div>

                                            <div className="flex flex-col gap-1.5 md:gap-2">
                                                <div className="flex gap-1.5 md:gap-2 h-7 md:h-14">
                                                    <div className={`flex-[2] bg-slate-950/60 border ${isBust ? 'border-red-500/50' : 'border-slate-700/50'} rounded-lg md:rounded-xl p-1 flex items-center justify-center relative overflow-hidden h-full`}>
                                                        {isBust ? <span className="text-[10px] md:text-lg font-black text-red-500 animate-pulse text-center leading-none drop-shadow-md">BUST</span>
                                                                : lastHit ? <span className="text-[10px] md:text-xl font-black text-white text-center leading-none drop-shadow-md">{lastHit.text}</span>
                                                                          : <span className="text-slate-400 font-bold text-[9px] md:text-xs">Toca la diana</span>}
                                                    </div>
                                                    <button onClick={handleMiss} disabled={!isActionAllowed() || isTurnComplete || winner || pendingConfirmation} className="flex-1 rounded-lg md:rounded-xl bg-red-900/40 text-red-400 border border-red-900/50 font-bold text-[9px] md:text-sm flex items-center justify-center disabled:opacity-30 active:bg-red-900/60 h-full backdrop-blur-sm">
                                                        Fallo
                                                    </button>
                                                </div>
                                                <div className="flex gap-1.5 md:gap-2 h-8 md:h-16">
                                                    <button onClick={undoThrow} disabled={!isActionAllowed() || currentTurnThrows.length === 0 || winner || pendingConfirmation} className="flex-1 rounded-lg md:rounded-xl bg-slate-800/60 text-slate-200 font-bold text-[9px] md:text-sm flex flex-col md:flex-row gap-1 items-center justify-center disabled:opacity-30 active:bg-slate-700/80 h-full backdrop-blur-sm border border-slate-600/30">
                                                        <IconUndo size={14} /> <span className="hidden lg:inline">Deshacer</span>
                                                    </button>
                                                    
                                                    <button onClick={requestTurnConfirmation} disabled={!isActionAllowed() || (!isTurnComplete && !winner) || pendingConfirmation} className={`flex-[2] rounded-lg md:rounded-xl font-black text-[10px] md:text-lg flex items-center justify-center gap-1 md:gap-2 transition-all h-full ${isTurnComplete && !winner ? 'bg-gradient-to-r from-cyan-500 to-blue-600 text-white animate-pulse shadow-[0_0_15px_rgba(6,182,212,0.5)]' : 'bg-slate-800/50 text-slate-500 opacity-50 border border-slate-700/50'}`}>
                                                        ENVIAR TURNO <IconArrowRight size={14} />
                                                    </button>
                                                </div>
                                            </div>
                                        </div>

                                        <div className={`${joinedViaUrl ? 'hidden md:flex' : 'flex-1'} bg-slate-900/80 backdrop-blur-md border border-slate-700/50 rounded-2xl overflow-hidden flex-col min-h-0 shadow-[0_0_20px_rgba(0,0,0,0.4)]`}>
                                            <div className="bg-slate-950/60 px-3 py-1.5 border-b border-slate-700/50 flex justify-between items-center shrink-0">
                                                <span className="text-[10px] md:text-xs font-bold text-slate-300 uppercase tracking-widest drop-shadow-md">En vivo</span>
                                                <span className="text-[9px] md:text-[10px] font-bold text-fuchsia-400 bg-fuchsia-900/40 px-2 rounded-full border border-fuchsia-500/30 drop-shadow-md truncate max-w-[120px]">
                                                    {GAME_MODES[gameMode].name}
                                                </span>
                                            </div>
                                            <div className="flex-1 min-h-0 overflow-hidden p-0.5">
                                                {isCricket ? (
                                                    <table className="w-full h-full text-center border-collapse table-fixed">
                                                        <thead>
                                                            <tr>
                                                                <th className="border-b border-slate-700/50 text-slate-400 w-8 md:w-12 text-[9px] md:text-[10px] uppercase">Nº</th>
                                                                {players.map((p, i) => <th key={p.id} className={`border-b border-slate-700/50 truncate text-[10px] md:text-xs font-black ${i === currentPlayerIdx ? 'text-cyan-400 bg-cyan-900/30' : 'text-slate-200'}`}>{p.name.substring(0,4)}</th>)}
                                                            </tr>
                                                        </thead>
                                                        <tbody>
                                                            {!isNoScore && (
                                                                <tr className="bg-slate-950/60 border-b border-cyan-800/50">
                                                                    <td className="border-r border-slate-700/50 text-fuchsia-400 font-bold text-[9px] md:text-[10px] uppercase drop-shadow-sm">PTS</td>
                                                                    {players.map((p, i) => <td key={`mini-pts-${p.id}`} className={`border-slate-700/50 font-black text-white text-xs md:text-sm drop-shadow-md ${i === currentPlayerIdx ? 'bg-cyan-900/20' : ''}`}>{p.score}</td>)}
                                                                </tr>
                                                            )}
                                                            {CRICKET_NUMBERS.map(num => (
                                                                <tr key={num}>
                                                                    <td className="border-t border-r border-slate-700/50 text-slate-200 font-black text-xs md:text-sm bg-slate-950/30">{num === 25 ? 'B' : num}</td>
                                                                    {players.map((p, i) => <td key={`mini-${p.id}-${num}`} className={`border-t border-slate-700/50 relative ${i === currentPlayerIdx ? 'bg-cyan-900/20' : ''}`}>{renderCricketMark(p.marks[num], true)}</td>)}
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                ) : (
                                                    <div className={`grid gap-1.5 w-full h-full ${getDynamicGridClass(players.length)} p-1`}>
                                                        {players.map((p, i) => (
                                                            <div key={p.id} className={`bg-slate-950/60 rounded-lg p-1 border flex flex-col items-center justify-center min-h-0 ${i === currentPlayerIdx ? 'border-cyan-500/80 bg-cyan-900/30' : 'border-slate-700/50'}`}>
                                                                <span className={`text-[9px] md:text-[10px] font-bold uppercase tracking-widest truncate w-full text-center shrink-0 drop-shadow-sm ${i === currentPlayerIdx ? 'text-cyan-400' : 'text-slate-400'}`}>{p.name}</span>
                                                                {gameMode === 'around_the_clock' && i === currentPlayerIdx ? (
                                                                    <span className="text-[8px] text-fuchsia-400 uppercase tracking-widest mb-[-4px]">Objetivo</span>
                                                                ) : null}
                                                                <span className={`text-xl md:text-3xl lg:text-4xl font-black min-h-0 drop-shadow-md ${i === currentPlayerIdx ? (gameMode === 'around_the_clock' ? 'text-fuchsia-400 animate-pulse' : 'text-white') : 'text-slate-300'}`}>{getLiveScore(p, i)}</span>
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>
                                        </div>

                                    </div>
                                </div>
                            )}

                            {activeTab === 'scores' && (
                                <div className="flex-1 flex flex-col bg-slate-900/80 backdrop-blur-md border border-slate-700/50 rounded-3xl overflow-hidden shadow-[0_0_30px_rgba(0,0,0,0.5)] min-h-0">
                                    {!isCricket && gameMode !== 'around_the_clock' && (
                                        <div className="p-2 md:p-3 bg-slate-950/80 border-b border-slate-700/50 flex justify-end items-center shrink-0">
                                            <span className="text-xs md:text-sm font-bold text-slate-200 bg-slate-800/80 px-3 md:px-4 py-1.5 md:py-2 rounded-full border border-slate-600/50 backdrop-blur-sm">Pts en ronda: <span className="text-cyan-400">+{currentTurnPoints}</span></span>
                                        </div>
                                    )}
                                    
                                    <div className="flex-1 min-h-0 overflow-hidden p-2 md:p-4">
                                        {!isCricket ? (
                                            <div className={`grid gap-3 md:gap-4 w-full h-full ${getDynamicGridClass(players.length)}`}>
                                                {players.map((p, i) => (
                                                    <div key={p.id} className={`bg-slate-950/60 backdrop-blur-sm rounded-2xl border-4 flex flex-col items-center justify-center min-h-0 p-2 md:p-4 ${i === currentPlayerIdx ? 'border-cyan-500/80 shadow-[0_0_30px_rgba(6,182,212,0.3)] bg-cyan-900/20' : 'border-slate-700/50'}`}>
                                                        <span className={`text-sm md:text-xl font-bold uppercase tracking-widest mb-1 md:mb-2 shrink-0 drop-shadow-md ${i === currentPlayerIdx ? 'text-cyan-400' : 'text-slate-400'}`}>
                                                            {p.name} {i === currentPlayerIdx && '(Tirando)'}
                                                        </span>
                                                        {gameMode === 'around_the_clock' && (
                                                            <span className="text-xs text-fuchsia-400 uppercase tracking-widest font-bold mb-[-10px] mt-2">Objetivo Actual</span>
                                                        )}
                                                        <span className={`text-5xl md:text-7xl lg:text-8xl font-black min-h-0 drop-shadow-lg ${i === currentPlayerIdx ? (gameMode === 'around_the_clock' ? 'text-fuchsia-400' : 'text-white') : 'text-slate-300'}`}>
                                                            {getLiveScore(p, i)}
                                                        </span>
                                                    </div>
                                                ))}
                                            </div>
                                        ) : (
                                            <table className="w-full h-full text-center border-collapse table-fixed">
                                                <thead>
                                                    <tr>
                                                        <th className="border-b-4 border-r-2 border-slate-700/80 text-slate-400 w-16 md:w-24 text-sm md:text-lg bg-slate-950/80 backdrop-blur-sm">Num</th>
                                                        {players.map((p, i) => <th key={p.id} className={`border-b-4 border-r-2 border-slate-700/80 ${i === currentPlayerIdx ? 'text-cyan-400 bg-cyan-900/40' : 'text-slate-200 bg-slate-950/80'} font-black text-sm md:text-2xl truncate backdrop-blur-sm drop-shadow-md`}>{p.name.substring(0,8)}</th>)}
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {!isNoScore && (
                                                        <tr className="bg-slate-950/60 border-b-4 border-cyan-800/60">
                                                            <td className="border-r-2 border-slate-700/80 font-black text-xs md:text-sm text-fuchsia-400 uppercase tracking-widest drop-shadow-md">PUNTOS</td>
                                                            {players.map((p, i) => <td key={`score-${p.id}`} className={`border-r-2 border-slate-700/80 font-black text-xl md:text-4xl text-white drop-shadow-lg ${i === currentPlayerIdx ? 'bg-cyan-900/30' : ''}`}>{p.score}</td>)}
                                                        </tr>
                                                    )}
                                                    {CRICKET_NUMBERS.map(num => (
                                                        <tr key={num} className="transition-colors">
                                                            <td className="border-t-2 border-r-2 border-slate-700/80 font-black text-xl md:text-3xl text-slate-200 bg-slate-950/40 drop-shadow-md">{num === 25 ? 'Bull' : num}</td>
                                                            {players.map((p, i) => <td key={`${p.id}-${num}`} className={`border-t-2 border-r-2 border-slate-700/80 relative ${i === currentPlayerIdx ? 'bg-cyan-900/30' : 'bg-slate-900/40'}`}>{renderCricketMark(p.marks[num])}</td>)}
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        )}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            return (
                <div className="w-full h-full flex flex-col text-white selection:bg-cyan-500 selection:text-white overflow-hidden relative bg-cover bg-center" style={{ backgroundImage: "url('https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=2071&auto=format&fit=crop')" }}>
                    <div className="absolute inset-0 bg-slate-950/70 z-0"></div>
                    
                    {/* Modal QR Único */}
                    {showQR && isOnline && roomId && !joinedViaUrl && (
                        <div className="absolute inset-0 z-50 bg-black/90 backdrop-blur-sm flex flex-col items-center justify-center p-4">
                            <div className="w-full max-w-lg flex flex-col items-center bg-slate-900 border border-slate-700 p-8 rounded-3xl shadow-2xl">
                                <h2 className="text-3xl md:text-4xl font-black text-white mb-2">SALA: <span className="text-fuchsia-400">{roomId}</span></h2>
                                <p className="text-slate-300 mb-6 font-bold text-center">Escanea este código con cualquier móvil para unirse a la partida como mando a distancia.</p>
                                <img src={`https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(generateSafeQRUrl())}`} alt="QR Sala" className="rounded-xl border-4 border-white w-full max-w-[250px] aspect-square shadow-[0_0_20px_rgba(255,255,255,0.2)] mb-8" />
                                <button onClick={() => setShowQR(false)} className="w-full bg-slate-800 hover:bg-slate-700 text-white font-bold py-4 rounded-xl transition-colors text-xl">Cerrar Código QR</button>
                            </div>
                        </div>
                    )}

                    {/* RUTEO PRINCIPAL */}
                    {joinedViaUrl ? (
                        localPlayerId === null ? renderMobilePlayerSelect() : (appState === 'playing' ? renderGame() : renderMobileWaiting())
                    ) : (
                        <>
                            {appState === 'home' && renderHome()}
                            {appState === 'setup_config' && renderConfig()}
                            {appState === 'setup_names' && renderNames()}
                            {appState === 'setup_qr' && renderSetupQR()}
                            {appState === 'playing' && renderGame()}
                        </>
                    )}
                    
                    <div className="absolute bottom-1 md:bottom-2 right-2 md:right-4 text-cyan-300/60 font-mono text-[10px] md:text-xs font-bold tracking-widest z-50 pointer-events-none drop-shadow-md">
                        AVS 3.2
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
