<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Meta tags esenciales para Tablet: Evita el zoom al hacer doble tap y ajusta la escala -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Darts</title>
    
    <!-- Tailwind CSS para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React y ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel para compilar JSX en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Optimizaciones táctiles para tablet */
        body {
            background-color: #020617; /* slate-950 */
            touch-action: none; /* Evita scroll al tocar la diana */
            user-select: none; /* Evita seleccionar texto por error */
            -webkit-user-select: none;
            overflow: hidden; /* Evita que la pantalla se mueva */
            font-family: system-ui, -apple-system, sans-serif;
        }
        
        /* Scrollbar personalizada cyber */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #06b6d4; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICONOS SVG INTEGRADOS (Sin dependencias externas) ---
        const IconTarget = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
        );
        const IconUsers = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        );
        const IconUser = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        );
        const IconPlay = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="currentColor" className={className}><polygon points="5 3 19 12 5 21 5 3"/></svg>
        );
        const IconArrowRight = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        );
        const IconUndo = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        );
        const IconDart = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="22" y1="2" x2="15" y2="9"/><line x1="10" y1="14" x2="2" y2="22"/><line x1="14" y1="10" x2="10" y2="14"/><path d="M15 9l4 4"/><path d="M22 2l-4-4"/><path d="M16 4l4 4"/></svg>
        );

        // --- MATEMÁTICAS DE LA DIANA ---
        const polarToCartesian = (cx, cy, r, angleInDegrees) => {
            const angleInRadians = (angleInDegrees - 90) * Math.PI / 180.0;
            return { x: cx + r * Math.cos(angleInRadians), y: cy + r * Math.sin(angleInRadians) };
        };

        const describeArc = (x, y, innerRadius, outerRadius, startAngle, endAngle) => {
            const startOuter = polarToCartesian(x, y, outerRadius, endAngle);
            const endOuter = polarToCartesian(x, y, outerRadius, startAngle);
            const startInner = polarToCartesian(x, y, innerRadius, endAngle);
            const endInner = polarToCartesian(x, y, innerRadius, startAngle);
            const largeArcFlag = endAngle - startAngle <= 180 ? '0' : '1';

            return [
                'M', startOuter.x, startOuter.y,
                'A', outerRadius, outerRadius, 0, largeArcFlag, 0, endOuter.x, endOuter.y,
                'L', endInner.x, endInner.y,
                'A', innerRadius, innerRadius, 0, largeArcFlag, 1, startInner.x, startInner.y,
                'Z'
            ].join(' ');
        };

        const SECTORS = [20, 1, 18, 4, 13, 6, 10, 15, 2, 17, 3, 19, 7, 16, 8, 11, 14, 9, 12, 5];

        // --- COMPONENTE PRINCIPAL ---
        function App() {
            const [appState, setAppState] = useState('setup_config'); // setup_config, setup_names, playing
            const [numPlayers, setNumPlayers] = useState(2);
            const [players, setPlayers] = useState([]);
            
            // Estado de la partida
            const [currentPlayerIdx, setCurrentPlayerIdx] = useState(0);
            const [currentTurnThrows, setCurrentTurnThrows] = useState([]);
            const [lastHit, setLastHit] = useState(null);

            const initPlayers = (names) => {
                const newPlayers = names.map((name, i) => ({
                    id: i,
                    name: name || `JUGADOR ${i + 1}`,
                    score: 0,
                    marks: { 20: 0, 19: 0, 18: 0, 17: 0, 16: 0, 15: 0, 25: 0 }
                }));
                setPlayers(newPlayers);
                setAppState('playing');
                setCurrentTurnThrows([]);
                setCurrentPlayerIdx(0);
                setLastHit(null);
            };

            const handleHit = (sector, multiplier) => {
                if (currentTurnThrows.length >= 3) return;

                let points = sector * multiplier;
                if (sector === 25) {
                    points = multiplier === 1 ? 25 : 50;
                }

                let text = `${sector}`;
                if (multiplier === 2) text = `Doble ${sector}`;
                if (multiplier === 3) text = `Triple ${sector}`;
                if (sector === 25 && multiplier === 1) text = `Outer Bull`;
                if (sector === 25 && multiplier === 2) text = `Centro (Bull)`;

                const throwData = { sector, multiplier, points, text };
                setCurrentTurnThrows([...currentTurnThrows, throwData]);
                setLastHit(throwData);
            };

            const undoThrow = () => {
                if (currentTurnThrows.length > 0) {
                    const newThrows = [...currentTurnThrows];
                    newThrows.pop();
                    setCurrentTurnThrows(newThrows);
                    setLastHit(newThrows.length > 0 ? newThrows[newThrows.length - 1] : null);
                }
            };

            const endTurn = () => {
                let updatedPlayers = [...players];
                // Clon profundo de las marcas para que React detecte el cambio
                let currentPlayer = { ...updatedPlayers[currentPlayerIdx] };
                currentPlayer.marks = { ...currentPlayer.marks };

                currentTurnThrows.forEach(t => {
                    const s = t.sector;
                    // Lógica básica Cricket: sumar marcas
                    if (currentPlayer.marks[s] !== undefined) {
                        currentPlayer.marks[s] += t.multiplier;
                        if (currentPlayer.marks[s] > 3) currentPlayer.marks[s] = 3; 
                    }
                });

                updatedPlayers[currentPlayerIdx] = currentPlayer;
                setPlayers(updatedPlayers);
                setCurrentTurnThrows([]);
                setLastHit(null);
                setCurrentPlayerIdx((currentPlayerIdx + 1) % players.length);
            };

            // --- PANTALLA 1: CONFIGURACIÓN ---
            const renderConfig = () => (
                <div className="flex flex-col items-center justify-center min-h-screen p-4 bg-slate-950 text-white relative">
                    <div className="absolute inset-0 opacity-20 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-cyan-900 via-slate-900 to-black pointer-events-none"></div>
                    <div className="z-10 w-full max-w-md bg-slate-900/90 p-8 rounded-3xl border border-cyan-500/30 shadow-[0_0_40px_rgba(6,182,212,0.15)] backdrop-blur-md">
                        <div className="flex justify-center mb-6">
                            <IconTarget size={80} className="text-cyan-400 drop-shadow-[0_0_15px_rgba(6,182,212,0.8)]" />
                        </div>
                        <h1 className="text-4xl font-black text-center mb-8 tracking-wider bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-fuchsia-500">
                            CYBER DARTS
                        </h1>
                        <div className="space-y-6">
                            <div>
                                <label className="block text-cyan-400 text-sm font-bold mb-2 uppercase flex items-center gap-2">
                                    <IconUsers size={16}/> Jugadores
                                </label>
                                <select value={numPlayers} onChange={(e) => setNumPlayers(Number(e.target.value))}
                                    className="w-full bg-slate-950 border-2 border-slate-700 text-white p-4 rounded-xl focus:outline-none focus:border-cyan-500 text-xl font-bold text-center">
                                    {[1, 2, 3, 4, 5, 6].map(n => <option key={n} value={n}>{n} {n === 1 ? 'Jugador' : 'Jugadores'}</option>)}
                                </select>
                            </div>
                            <button onClick={() => setAppState('setup_names')}
                                className="w-full mt-8 bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 text-white font-black py-4 px-6 rounded-xl shadow-[0_0_20px_rgba(6,182,212,0.4)] flex items-center justify-center gap-3 text-xl uppercase tracking-widest active:scale-95 transition-transform">
                                Siguiente <IconArrowRight size={24} />
                            </button>
                        </div>
                    </div>
                </div>
            );

            // --- PANTALLA 2: NOMBRES ---
            const renderNames = () => {
                const [tempNames, setTempNames] = useState(Array(numPlayers).fill(''));
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen p-4 bg-slate-950 text-white relative">
                        <div className="z-10 w-full max-w-md bg-slate-900/90 p-8 rounded-3xl border border-fuchsia-500/30 shadow-[0_0_40px_rgba(236,72,153,0.15)]">
                            <h2 className="text-3xl font-black text-center mb-6 tracking-wider text-fuchsia-400">NOMBRES</h2>
                            <div className="space-y-4 max-h-[60vh] overflow-y-auto pr-2 pb-2">
                                {Array.from({ length: numPlayers }).map((_, i) => (
                                    <div key={i} className="relative">
                                        <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                            <IconUser size={20} className="text-slate-500" />
                                        </div>
                                        <input type="text" placeholder={`Jugador ${i + 1}`} value={tempNames[i]}
                                            onChange={(e) => {
                                                const newNames = [...tempNames];
                                                newNames[i] = e.target.value.toUpperCase();
                                                setTempNames(newNames);
                                            }}
                                            className="w-full bg-slate-950 border-2 border-slate-700 text-cyan-300 pl-12 pr-4 py-4 rounded-xl focus:outline-none focus:border-fuchsia-500 text-lg font-bold uppercase"
                                        />
                                    </div>
                                ))}
                            </div>
                            <div className="flex gap-4 mt-6">
                                <button onClick={() => setAppState('setup_config')} className="flex-1 bg-slate-800 text-white font-bold py-4 rounded-xl active:bg-slate-700">Atrás</button>
                                <button onClick={() => initPlayers(tempNames)} className="flex-[2] bg-gradient-to-r from-fuchsia-600 to-purple-600 text-white font-black py-4 rounded-xl shadow-[0_0_20px_rgba(236,72,153,0.4)] flex items-center justify-center gap-2 text-lg uppercase active:scale-95 transition-transform">
                                    <IconPlay size={20} /> Iniciar
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };

            // --- PANTALLA 3: JUEGO (Tablet Layout) ---
            const renderGame = () => {
                // Configuración visual diana
                const cx = 150, cy = 150, maxR = 140;
                const rInnerBull = 8, rOuterBull = 18, rInnerSingle = 70, rTreble = 85, rOuterSingle = 125, rDouble = maxR;
                const colors = { dark: '#0f172a', light: '#334155', double1: '#ec4899', double2: '#06b6d4', text: '#94a3b8' };
                const getColors = (index) => ({ single: index % 2 === 0 ? colors.dark : colors.light, ring: index % 2 === 0 ? colors.double1 : colors.double2 });

                // Renderizador de marcas (Cricket)
                const renderMark = (count) => {
                    if (count === 0) return null;
                    if (count === 1) return <span className="text-2xl text-cyan-400 font-bold">/</span>;
                    if (count === 2) return <span className="text-2xl text-cyan-400 font-bold">X</span>;
                    return (
                        <div className="relative flex items-center justify-center">
                            <span className="text-2xl text-fuchsia-400 font-bold">X</span>
                            <div className="absolute w-8 h-8 rounded-full border-2 border-fuchsia-400"></div>
                        </div>
                    );
                };

                return (
                    <div className="flex flex-col md:flex-row h-screen w-full bg-slate-950 p-2 md:p-4 gap-4 text-white">
                        
                        {/* IZQUIERDA: DIANA GIGANTE */}
                        <div className="flex-1 md:max-w-[45%] flex items-center justify-center bg-slate-900 rounded-3xl border border-slate-800 shadow-inner p-2 h-full relative overflow-hidden">
                            <div className="absolute inset-0 opacity-5" style={{ backgroundImage: 'linear-gradient(#334155 1px, transparent 1px), linear-gradient(90deg, #334155 1px, transparent 1px)', backgroundSize: '20px 20px'}}></div>
                            
                            <svg viewBox="0 0 300 300" className="w-full h-full max-h-[95vh] drop-shadow-[0_0_20px_rgba(0,0,0,1)] z-10">
                                <circle cx={cx} cy={cy} r={maxR + 10} fill="#020617" />
                                {SECTORS.map((sector, i) => {
                                    const startAngle = i * 18 - 9, endAngle = i * 18 + 9, textAngle = i * 18;
                                    const textPos = polarToCartesian(cx, cy, maxR + 5, textAngle);
                                    const { single, ring } = getColors(i);
                                    return (
                                        <g key={`sector-${sector}`}>
                                            <path d={describeArc(cx, cy, rTreble, rOuterSingle, startAngle, endAngle)} fill={single} stroke="#1e293b" strokeWidth="0.5" className="cursor-pointer active:opacity-50" onClick={() => handleHit(sector, 1)} />
                                            <path d={describeArc(cx, cy, rOuterBull, rInnerSingle, startAngle, endAngle)} fill={single} stroke="#1e293b" strokeWidth="0.5" className="cursor-pointer active:opacity-50" onClick={() => handleHit(sector, 1)} />
                                            <path d={describeArc(cx, cy, rOuterSingle, rDouble, startAngle, endAngle)} fill={ring} stroke="#0f172a" strokeWidth="1" className="cursor-pointer active:brightness-150" onClick={() => handleHit(sector, 2)} />
                                            <path d={describeArc(cx, cy, rInnerSingle, rTreble, startAngle, endAngle)} fill={ring} stroke="#0f172a" strokeWidth="1" className="cursor-pointer active:brightness-150" onClick={() => handleHit(sector, 3)} />
                                            <text x={textPos.x} y={textPos.y} fontSize="9" fill={colors.text} textAnchor="middle" dominantBaseline="middle" fontWeight="bold" transform={`rotate(${textAngle}, ${textPos.x}, ${textPos.y})`}>{sector}</text>
                                        </g>
                                    );
                                })}
                                <circle cx={cx} cy={cy} r={rOuterBull} fill={colors.double2} stroke="#0f172a" strokeWidth="1" className="cursor-pointer active:brightness-150" onClick={() => handleHit(25, 1)} />
                                <circle cx={cx} cy={cy} r={rInnerBull} fill={colors.double1} stroke="#0f172a" strokeWidth="1" className="cursor-pointer active:brightness-150" onClick={() => handleHit(25, 2)} />
                            </svg>
                        </div>

                        {/* DERECHA: CONTROLES Y PUNTUACIÓN */}
                        <div className="flex-1 flex flex-col gap-4 h-full overflow-hidden">
                            
                            {/* Panel Superior: Turno actual */}
                            <div className="bg-slate-900 border border-slate-800 p-4 md:p-6 rounded-3xl flex flex-col justify-between shadow-lg">
                                <div className="flex justify-between items-center mb-4">
                                    <div className="flex-1">
                                        <span className="text-slate-400 text-xs uppercase tracking-widest font-bold">Turno de</span>
                                        <h3 className="text-3xl md:text-4xl font-black text-cyan-400 truncate">{players[currentPlayerIdx].name}</h3>
                                    </div>
                                    <div className="flex gap-2">
                                        {[0, 1, 2].map((i) => {
                                            const isThrown = i < currentTurnThrows.length;
                                            return (
                                                <div key={i} className={`w-12 h-12 md:w-14 md:h-14 rounded-full flex items-center justify-center border-2 transition-all ${isThrown ? 'border-fuchsia-500 bg-fuchsia-500/20 shadow-[0_0_15px_rgba(236,72,153,0.5)]' : 'border-slate-700 bg-slate-800'}`}>
                                                    <IconDart size={20} className={isThrown ? 'text-fuchsia-400' : 'text-slate-600'} />
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>

                                <div className="flex gap-3 items-center">
                                    <div className="flex-1 bg-slate-950 border border-slate-800 rounded-xl p-3 flex items-center justify-center h-16">
                                        {lastHit ? (
                                            <span className="text-2xl font-black text-white">{lastHit.text}</span>
                                        ) : (
                                            <span className="text-slate-600 font-bold text-sm">Toca la diana</span>
                                        )}
                                    </div>
                                    <button onClick={undoThrow} disabled={currentTurnThrows.length === 0} className="h-16 px-6 rounded-xl bg-slate-800 text-slate-300 font-bold flex items-center justify-center gap-2 disabled:opacity-30 active:bg-slate-700">
                                        <IconUndo size={20} />
                                    </button>
                                    <button onClick={endTurn} disabled={currentTurnThrows.length < 3 && currentTurnThrows.length !== 0 /* Permitir pasar si no hay dardos, o forzar 3 */} className={`h-16 px-6 rounded-xl font-black flex items-center justify-center gap-2 transition-all ${currentTurnThrows.length === 3 ? 'bg-gradient-to-r from-cyan-500 to-blue-600 text-white shadow-[0_0_15px_rgba(6,182,212,0.4)] animate-pulse' : 'bg-slate-800 text-slate-500'}`}>
                                        Siguiente <IconArrowRight size={20} />
                                    </button>
                                </div>
                            </div>

                            {/* Panel Inferior: Tabla de Cricket */}
                            <div className="flex-1 bg-slate-900 border border-slate-800 rounded-3xl overflow-hidden flex flex-col shadow-lg">
                                <div className="p-3 bg-slate-950 border-b border-slate-800 text-center">
                                    <h2 className="text-lg font-black tracking-widest text-slate-400 uppercase">Marcador Cricket</h2>
                                </div>
                                <div className="flex-1 overflow-auto">
                                    <table className="w-full text-center border-collapse">
                                        <thead className="sticky top-0 bg-slate-900 z-10 shadow-md">
                                            <tr>
                                                <th className="p-3 border-b-2 border-slate-700 text-slate-500 w-16 text-sm">Num</th>
                                                {players.map((p, i) => (
                                                    <th key={p.id} className={`p-3 border-b-2 ${i === currentPlayerIdx ? 'border-cyan-500 text-cyan-400' : 'border-slate-700 text-white'} font-black text-lg truncate max-w-[100px]`}>
                                                        {p.name.substring(0,6)}
                                                    </th>
                                                ))}
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {[20, 19, 18, 17, 16, 15, 25].map(num => (
                                                <tr key={num} className="hover:bg-slate-800/50">
                                                    <td className="p-2 border-b border-slate-800 font-black text-xl text-slate-300 bg-slate-950/50">
                                                        {num === 25 ? 'B' : num}
                                                    </td>
                                                    {players.map(p => (
                                                        <td key={p.id} className="p-2 border-b border-slate-800 h-12 relative">
                                                            {renderMark(p.marks[num])}
                                                        </td>
                                                    ))}
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                            
                        </div>
                    </div>
                );
            };

            return (
                <div className="h-screen w-screen overflow-hidden selection:bg-cyan-500 selection:text-white">
                    {appState === 'setup_config' && renderConfig()}
                    {appState === 'setup_names' && renderNames()}
                    {appState === 'playing' && renderGame()}
                </div>
            );
        }

        // Renderizado inicial
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
