    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- ICONOS ---
        const IconTarget = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>;

        const IconArrowRight = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>;

        const IconTrophy = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>;
        const IconGamepad = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="6" y1="12" x2="10" y2="12"/><line x1="8" y1="10" x2="8" y2="14"/><line x1="15" y1="13" x2="15.01" y2="13"/><line x1="18" y1="11" x2="18.01" y2="11"/><rect x="2" y="6" width="20" height="12" rx="2"/></svg>;
        const IconList = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>;
        const IconPower = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>;
        const IconQrCode = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="6" height="6" rx="1"/><rect x="15" y="3" width="6" height="6" rx="1"/><rect x="3" y="15" width="6" height="6" rx="1"/><path d="M21 15v6"/><path d="M15 21h6"/><path d="M15 15h6"/><path d="M7 7h2"/><path d="M19 7h2"/><path d="M7 19h2"/></svg>;
        const IconMedal = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M7.21 15 2.66 7.14a2 2 0 0 1 .13-2.2L4.4 2.8A2 2 0 0 1 6 2h12a2 2 0 0 1 1.6.8l1.6 2.14a2 2 0 0 1 .14 2.2L16.79 15"/><circle cx="12" cy="15" r="5"/><path d="M12 18v-2"/></svg>;

        // --- MATEMÁTICAS DIANA ---
        const polarToCartesian = (cx, cy, r, angleInDegrees) => {
            const angleInRadians = (angleInDegrees - 90) * Math.PI / 180.0;
            return { x: cx + r * Math.cos(angleInRadians), y: cy + r * Math.sin(angleInRadians) };
        };

        const describeArc = (x, y, innerRadius, outerRadius, startAngle, endAngle) => {
            const startOuter = polarToCartesian(x, y, outerRadius, endAngle);
            const endOuter = polarToCartesian(x, y, outerRadius, startAngle);
            const startInner = polarToCartesian(x, y, innerRadius, endAngle);
            const endInner = polarToCartesian(x, y, innerRadius, startAngle);
            const largeArcFlag = endAngle - startAngle <= 180 ? '0' : '1';
            return ['M', startOuter.x, startOuter.y, 'A', outerRadius, outerRadius, 0, largeArcFlag, 0, endOuter.x, endOuter.y, 'L', endInner.x, endInner.y, 'A', innerRadius, innerRadius, 0, largeArcFlag, 1, startInner.x, startInner.y, 'Z'].join(' ');
        };

        const SECTORS = [20, 1, 18, 4, 13, 6, 10, 15, 2, 17, 3, 19, 7, 16, 8, 11, 14, 9, 12, 5];
        const CRICKET_NUMBERS = [20, 19, 18, 17, 16, 15, 25];

        const GAME_MODES = {
            'cut_throat': { name: 'Cricket Inverso', type: 'cricket', desc: 'Cerrar del 15 al 20. Dar a un cerrado SUMA PUNTOS AL RIVAL. Gana el que cierra todo con menos puntos.' },
            'normal_cricket': { name: 'Cricket (Puntos)', type: 'cricket', desc: 'Cerrar del 15 al 20. Dar a un cerrado TE SUMA PUNTOS. Gana el que cierra todo con más puntos.' },
            'no_score_cricket': { name: 'Cricket (Sin Puntos)', type: 'cricket', desc: 'El más rápido. Cerrar del 15 al 20 y Bull. No hay puntos, gana el primero en cerrar.' },
            '301': { name: '301', type: 'x01', desc: 'Llega a 0 exacto. Si te pasas, haces BUST.' },
            '501': { name: '501', type: 'x01', desc: 'Llega a 0 exacto. Clásico de torneo.' },
            '701': { name: '701', type: 'x01', desc: 'Llega a 0 exacto. Partida media/larga.' },
            '901': { name: '901', type: 'x01', desc: 'Llega a 0 exacto. Partida masiva (Ideal equipos).' },
            'high_score': { name: 'High Score', type: 'stats', desc: '7 Rondas. Todos los números valen. Gana el de MAYOR puntuación.' },
            'around_the_clock': { name: 'Reloj (1 al 20)', type: 'stats', desc: 'Acertar del 1 al 20 en orden consecutivo. Gana el primero que llega y acierta al 20.' }
        };

        function App() {
            // --- FIREBASE INITIALIZATION ---
            const [fbLoaded, setFbLoaded] = useState(false);
            const [firebaseDb, setFirebaseDb] = useState(null);
            const [firebaseAuth, setFirebaseAuth] = useState(null);
            const [user, setUser] = useState(null);

            const appId = typeof __app_id !== 'undefined' ? __app_id : 'manitos-darts-default';

            useEffect(() => {
                const checkFb = setInterval(() => {
                    if (window.fb) {
                        setFbLoaded(true);
                        clearInterval(checkFb);
                        
                        try {
                            const firebaseConfig = typeof __firebase_config !== 'undefined'
                                ? JSON.parse(__firebase_config)
                                : {
                                    apiKey: "AIzaSyB0qANx0EICZiBp1wVo4DSzSLNbZlwiR7M",
                                    authDomain: "manitos-darts.firebaseapp.com",
                                    projectId: "manitos-darts",
                                    storageBucket: "manitos-darts.firebasestorage.app",
                                    messagingSenderId: "570426204253",
                                    appId: "1:570426204253:web:e7772abc0d2410638e6db4",
                                    measurementId: "G-0XZ3S9D9Q5"
                                };

                            const app = window.fb.initializeApp(firebaseConfig);
                            const auth = window.fb.getAuth(app);
                            setFirebaseAuth(auth);
                            setFirebaseDb(window.fb.getFirestore(app));

                            const initAuth = async () => {
                                try {
                                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                        await window.fb.signInWithCustomToken(auth, __initial_auth_token);
                                    } else {
                                        await window.fb.signInAnonymously(auth);
                                    }
                                } catch(e) { console.error("Error Auth:", e); }
                            };
                            initAuth();
                            window.fb.onAuthStateChanged(auth, setUser);

                        } catch(e) { console.warn("Firebase no configurado correctamente.", e); }
                    }
                }, 50);
                return () => clearInterval(checkFb);
            }, []);

            // --- ESTADO ÚNICO DEL JUEGO (Sincronizado) ---
            const [gameState, setGameState] = useState({
                appState: 'home', 
                gameMode: 'cut_throat',
                numPlayers: 2,
                players: [],
                activeTab: 'board',
                currentPlayerIdx: 0,
                currentTurnThrows: [],
                lastHit: null,
                winner: null,
                round: 1,
                isBust: false,
                pendingConfirmation: false 
            });

            // Estados Locales
            const [isOnline, setIsOnline] = useState(false);
            const [roomId, setRoomId] = useState(null);
            const [localPlayerId, setLocalPlayerId] = useState(null); 
            const [joinedViaUrl, setJoinedViaUrl] = useState(false); 
            const [tempNames, setTempNames] = useState(['', '']); 
            const [showExitConfirm, setShowExitConfirm] = useState(false);
            const [showQR, setShowQR] = useState(false);
            
            // Estado del Ranking
            const [rankingList, setRankingList] = useState([]);
            const [rankingGameFilter, setRankingGameType] = useState('cricket');

            // --- SINCRONIZACIÓN CON FIREBASE ---
            useEffect(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const room = urlParams.get('room');
                if (room && user) {
                    setIsOnline(true);
                    setRoomId(room.toUpperCase());
                    setJoinedViaUrl(true);
                }
            }, [user]);

            useEffect(() => {
                if (!isOnline || !roomId || !firebaseDb || !user) return;
                const roomRef = window.fb.doc(firebaseDb, 'artifacts', appId, 'public', 'data', 'rooms', roomId);
                const unsub = window.fb.onSnapshot(roomRef, (snap) => {
                    if (snap.exists()) {
                        setGameState(prev => ({ ...prev, ...snap.data() }));
                    }
                }, (err) => console.error("Error Sync:", err));
                return () => unsub();
            }, [isOnline, roomId, firebaseDb, user]);

            const updateGame = (updates) => {
                setGameState(prev => {
                    const next = { ...prev, ...updates };
                    if (isOnline && roomId && firebaseDb && user) {
                        const roomRef = window.fb.doc(firebaseDb, 'artifacts', appId, 'public', 'data', 'rooms', roomId);
                        window.fb.setDoc(roomRef, next, { merge: true }).catch(e => console.error(e));
                    }
                    return next;
                });
            };

            // --- LÓGICA DE RANKING ---
            const saveToRanking = async (winnerObj) => {
                if (!isOnline || !firebaseDb || !user || !winnerObj) return;
                
                const modeInfo = GAME_MODES[gameState.gameMode];
                let statValue = 0;
                let statLabel = "";

                if (modeInfo.type === 'cricket') {
                    statLabel = "MPR";
                    // MPR = Total de marcas conseguidas / Rondas
                    statValue = (winnerObj.totalMarksSum / gameState.round).toFixed(2);
                } else if (modeInfo.type === 'x01') {
                    statLabel = "PPD";
                    // PPD = Puntos totales del juego / Total dardos
                    statValue = (parseInt(gameState.gameMode) / winnerObj.totalDartsThrown).toFixed(2);
                } else {
                    return; // Otros juegos no guardan ranking por ahora
                }

                try {
                    const rankingRef = window.fb.collection(firebaseDb, 'artifacts', appId, 'public', 'data', 'rankings');
                    await window.fb.addDoc(rankingRef, {
                        playerName: winnerObj.name,
                        gameMode: gameState.gameMode,
                        gameType: modeInfo.type,
                        statValue: parseFloat(statValue),
                        statLabel: statLabel,
                        date: new Date().toISOString()
                    });
                } catch(e) { console.error("Error saving ranking:", e); }
            };

            const loadRankings = async () => {
                if (!firebaseDb || !user) return;
                try {
                    const rankingRef = window.fb.collection(firebaseDb, 'artifacts', appId, 'public', 'data', 'rankings');
                    const snap = await window.fb.getDocs(rankingRef);
                    const data = snap.docs.map(doc => doc.data());
                    setRankingList(data);
                } catch(e) { console.error("Error loading rankings:", e); }
            };

            // --- LÓGICA DEL JUEGO ---
            const { appState, gameMode, numPlayers, players, activeTab, currentPlayerIdx, currentTurnThrows, lastHit, winner, round, isBust, pendingConfirmation } = gameState;

            const handleCreateRoom = () => {
                const id = Math.random().toString(36).substring(2, 6).toUpperCase();
                setRoomId(id);
                setIsOnline(true);
                updateGame({ appState: 'setup_config' });
            };

            const handleGoToNames = () => {
                setTempNames(Array(numPlayers).fill(''));
                updateGame({ appState: 'setup_names' });
            };

            const initPlayers = () => {
                const initialScore = ['301', '501', '701', '901'].includes(gameMode) ? parseInt(gameMode) : 
                                     (gameMode === 'around_the_clock' ? 1 : 0);
                
                const newPlayers = tempNames.map((name, i) => ({
                    id: i,
                    name: name.trim() || `Jugador ${i + 1}`,
                    score: initialScore, 
                    previousRoundScore: initialScore,
                    marks: { 20: 0, 19: 0, 18: 0, 17: 0, 16: 0, 15: 0, 25: 0 },
                    totalMarksSum: 0, // Para ranking
                    totalDartsThrown: 0 // Para ranking
                }));
                
                updateGame({
                    players: newPlayers,
                    currentPlayerIdx: 0,
                    currentTurnThrows: [],
                    lastHit: null,
                    winner: null,
                    round: 1,
                    isBust: false,
                    activeTab: 'board',
                    pendingConfirmation: false,
                    appState: isOnline ? 'setup_qr' : 'playing'
                });
                setShowExitConfirm(false);
            };

            const isActionAllowed = () => {
                if (!joinedViaUrl) return true; 
                return localPlayerId === currentPlayerIdx; 
            };

            const handleHit = (sector, multiplier) => {
                if (!isActionAllowed()) return;
                if (currentTurnThrows.length >= 3 || winner || isBust || pendingConfirmation) return;
                
                const isCricket = ['cut_throat', 'normal_cricket', 'no_score_cricket'].includes(gameMode);
                if (isCricket && !CRICKET_NUMBERS.includes(sector)) {
                    handleMiss();
                    return;
                }

                let points = sector * multiplier;
                if (sector === 25) points = multiplier === 1 ? 25 : 50;

                const throwData = { sector, multiplier, points, text: multiplier === 3 ? `T${sector}` : multiplier === 2 ? `D${sector}` : `${sector}` };
                const newThrows = [...currentTurnThrows, throwData];
                
                let newIsBust = isBust;
                let newWinner = winner;
                let newPlayers = [...players];

                if (['301', '501', '701', '901'].includes(gameMode)) {
                    const currentPointsScored = newThrows.reduce((sum, t) => sum + t.points, 0);
                    const remaining = newPlayers[currentPlayerIdx].previousRoundScore - currentPointsScored;
                    if (remaining < 0 || remaining === 1) { 
                        newIsBust = true;
                    } else if (remaining === 0) {
                        newPlayers[currentPlayerIdx].score = 0;
                        newWinner = newPlayers[currentPlayerIdx];
                    }
                } else if (gameMode === 'around_the_clock') {
                    let currentTarget = newPlayers[currentPlayerIdx].score;
                    newThrows.forEach(t => { if (t.sector === currentTarget) currentTarget++; });
                    if (currentTarget > 20) {
                        newPlayers[currentPlayerIdx].score = currentTarget;
                        newWinner = newPlayers[currentPlayerIdx];
                    }
                }

                updateGame({
                    currentTurnThrows: newThrows,
                    lastHit: throwData,
                    isBust: newIsBust,
                    winner: newWinner,
                    players: newPlayers
                });
            };

            const handleMiss = () => {
                if (!isActionAllowed()) return;
                if (currentTurnThrows.length >= 3 || winner || isBust || pendingConfirmation) return;
                updateGame({
                    currentTurnThrows: [...currentTurnThrows, { sector: 0, multiplier: 0, points: 0, text: 'Fallo' }],
                    lastHit: { text: 'Fallo' }
                });
            };

            const requestTurnConfirmation = () => {
                if (!isActionAllowed()) return;
                if (currentTurnThrows.length < 3 && !isBust) return;
                if (isOnline && joinedViaUrl) updateGame({ pendingConfirmation: true });
                else endTurn(); 
            };

            const endTurn = () => {
                let updatedPlayers = players.map(p => ({ ...p, marks: { ...p.marks } }));
                let currentP = updatedPlayers[currentPlayerIdx];
                const pointsScoredThisTurn = currentTurnThrows.reduce((sum, t) => sum + t.points, 0);

                // Tracking de dardos totales para ranking
                currentP.totalDartsThrown += currentTurnThrows.length;

                if (['301', '501', '701', '901'].includes(gameMode)) {
                    if (isBust) currentP.score = currentP.previousRoundScore;
                    else {
                        currentP.score = currentP.previousRoundScore - pointsScoredThisTurn;
                        currentP.previousRoundScore = currentP.score;
                    }
                } 
                else if (gameMode === 'high_score') currentP.score += pointsScoredThisTurn;
                else if (gameMode === 'around_the_clock') {
                    currentTurnThrows.forEach(t => { if (t.sector === currentP.score) currentP.score += 1; });
                }
                else {
                    const isCutThroat = gameMode === 'cut_throat';
                    const isNoScore = gameMode === 'no_score_cricket';
                    
                    currentTurnThrows.forEach(t => {
                        const s = t.sector;
                        if (s !== 0 && currentP.marks[s] !== undefined) {
                            let marksScored = t.multiplier;
                            // Track de marcas totales para ranking (solo hasta cerrar)
                            currentP.totalMarksSum += marksScored;

                            let marksNeededToClose = 3 - currentP.marks[s];
                            if (marksNeededToClose > 0) {
                                if (marksScored <= marksNeededToClose) {
                                    currentP.marks[s] += marksScored;
                                    marksScored = 0;
                                } else {
                                    currentP.marks[s] = 3;
                                    marksScored -= marksNeededToClose;
                                }
                            }

                            if (marksScored > 0 && !isNoScore) {
                                const pointsToDistribute = s * marksScored;
                                if (isCutThroat) updatedPlayers.forEach((otherP, idx) => { if (idx !== currentPlayerIdx && otherP.marks[s] < 3) otherP.score += pointsToDistribute; });
                                else { 
                                    const anyRivalOpen = updatedPlayers.some((otherP, idx) => idx !== currentPlayerIdx && otherP.marks[s] < 3);
                                    if (anyRivalOpen) currentP.score += pointsToDistribute;
                                }
                            }
                        }
                    });
                }

                let possibleWinner = winner || (['cut_throat', 'normal_cricket', 'no_score_cricket'].includes(gameMode) ? checkWinnerCricket(updatedPlayers, gameMode) : null);
                if (gameMode === 'high_score' && currentPlayerIdx === players.length - 1 && round === 7) {
                    possibleWinner = [...updatedPlayers].sort((a, b) => b.score - a.score)[0];
                }

                // SI HAY GANADOR, GUARDAR EN RANKING
                if (possibleWinner && isOnline && !winner) {
                    saveToRanking(possibleWinner);
                }

                let nextPlayerIdx = (currentPlayerIdx + 1) % players.length;
                let nextRound = (currentPlayerIdx === players.length - 1) ? round + 1 : round;

                updateGame({
                    players: updatedPlayers,
                    currentTurnThrows: [],
                    lastHit: null,
                    isBust: false,
                    pendingConfirmation: false,
                    winner: possibleWinner,
                    currentPlayerIdx: nextPlayerIdx,
                    round: nextRound,
                    activeTab: 'board'
                });
            };

            const getDynamicGridClass = (totalItems) => {
                if (totalItems <= 3) return `grid-cols-${totalItems} grid-rows-1`;
                if (totalItems === 4) return 'grid-cols-2 grid-rows-2';
                return 'grid-cols-3 grid-rows-2'; 
            };

            const generateSafeQRUrl = () => {
                const baseUrl = window.location.href.split('?')[0];
                return `${baseUrl}?room=${roomId}`;
            };

            // --- RENDERIZADO DE VISTAS ---

            const renderRanking = () => {
                const filtered = rankingList
                    .filter(r => (rankingGameFilter === 'cricket' ? r.gameType === 'cricket' : r.gameType === 'x01'))
                    .sort((a, b) => b.statValue - a.statValue)
                    .slice(0, 10);

                return (
                    <div className="flex-1 flex flex-col items-center justify-center p-4 relative z-10 min-h-0">
                        <div className="z-10 w-full max-w-2xl bg-slate-900/90 backdrop-blur-xl p-6 rounded-3xl border border-yellow-500/30 shadow-[0_0_50px_rgba(234,179,8,0.2)] flex flex-col min-h-0 h-full max-h-[85vh]">
                            <div className="flex justify-between items-center mb-6 shrink-0">
                                <h2 className="text-3xl font-black text-yellow-400 flex items-center gap-2"><IconMedal /> RANKING GLOBAL</h2>
                                <button onClick={() => setAppState('home')} className="bg-slate-800 text-white font-bold py-2 px-6 rounded-xl">Volver</button>
                            </div>

                            <div className="flex gap-2 mb-6 shrink-0">
                                <button onClick={() => setRankingGameType('cricket')} className={`flex-1 py-3 rounded-xl font-bold border-2 transition-all ${rankingGameFilter === 'cricket' ? 'bg-yellow-500 text-slate-950 border-yellow-400' : 'bg-slate-800 text-slate-400 border-slate-700'}`}>MODO CRICKET (MPR)</button>
                                <button onClick={() => setRankingGameType('x01')} className={`flex-1 py-3 rounded-xl font-bold border-2 transition-all ${rankingGameFilter === 'x01' ? 'bg-yellow-500 text-slate-950 border-yellow-400' : 'bg-slate-800 text-slate-400 border-slate-700'}`}>MODO X01 (PPD)</button>
                            </div>

                            <div className="flex-1 overflow-y-auto min-h-0 rounded-2xl bg-slate-950/50 border border-slate-800">
                                <table className="w-full text-center border-collapse">
                                    <thead className="sticky top-0 bg-slate-900 z-10 shadow-md">
                                        <tr>
                                            <th className="p-4 text-slate-500 uppercase text-xs">Pos</th>
                                            <th className="p-4 text-slate-300 font-bold uppercase text-xs text-left">Jugador</th>
                                            <th className="p-4 text-slate-500 uppercase text-xs">Juego</th>
                                            <th className="p-4 text-yellow-400 font-black uppercase text-xs">{rankingGameFilter === 'cricket' ? 'MPR' : 'PPD'}</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {filtered.length > 0 ? filtered.map((r, i) => (
                                            <tr key={i} className={`border-b border-slate-900 hover:bg-slate-800/30 transition-colors ${i === 0 ? 'bg-yellow-900/10' : ''}`}>
                                                <td className="p-4 font-black text-slate-400">{i + 1}º</td>
                                                <td className="p-4 font-black text-white text-left truncate max-w-[150px]">{r.playerName}</td>
                                                <td className="p-4 text-slate-500 text-xs uppercase font-bold">{r.gameMode}</td>
                                                <td className="p-4 font-black text-xl text-yellow-400">{r.statValue}</td>
                                            </tr>
                                        )) : (
                                            <tr><td colSpan="4" className="p-12 text-slate-600 font-bold">No hay puntuaciones registradas aún</td></tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="w-full h-full flex flex-col text-white selection:bg-cyan-500 selection:text-white overflow-hidden relative bg-cover bg-center" style={{ backgroundImage: "url('https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=2071&auto=format&fit=crop')" }}>
                    <div className="absolute inset-0 bg-slate-950/70 z-0"></div>
                    
                    {/* UI del Juego condicional */}
                    {joinedViaUrl ? (
                        localPlayerId === null ? renderMobilePlayerSelect() : (appState === 'playing' ? renderGame() : renderMobileWaiting())
                    ) : (
                        <>
                            {appState === 'home' && (
                                <div className="flex-1 flex flex-col items-center justify-center p-4 relative z-10">
                                    <div className="z-10 w-full max-w-lg bg-slate-900/80 backdrop-blur-xl p-8 rounded-3xl border border-cyan-500/30 shadow-[0_0_50px_rgba(6,182,212,0.2)] flex flex-col text-center">
                                        <IconTarget size={80} className="text-cyan-400 mx-auto mb-4 drop-shadow-[0_0_15px_rgba(6,182,212,0.8)]" />
                                        <h1 className="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-fuchsia-500 mb-8 drop-shadow-md uppercase tracking-tighter">Manito's Darts</h1>
                                        
                                        <div className="space-y-3">
                                            <button onClick={() => updateGame({ appState: 'setup_config' })} className="w-full bg-slate-800/80 hover:bg-slate-700/80 border border-slate-600/50 text-white font-black py-4 px-6 rounded-xl flex items-center justify-center gap-3 text-lg uppercase transition-all shadow-lg">
                                                <IconTarget size={24} /> Partida Local
                                            </button>

                                            <button onClick={handleCreateRoom} className="w-full bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-white font-black py-4 px-6 rounded-xl flex items-center justify-center gap-3 text-lg uppercase transition-all shadow-[0_0_20px_rgba(6,182,212,0.4)]">
                                                <IconQrCode size={24} /> Crear Sala Online
                                            </button>

                                            <button onClick={() => { setAppState('ranking'); loadRankings(); }} className="w-full bg-yellow-600 hover:bg-yellow-500 text-slate-950 font-black py-4 px-6 rounded-xl flex items-center justify-center gap-3 text-lg uppercase transition-all shadow-[0_0_20px_rgba(234,179,8,0.3)] mt-4">
                                                <IconMedal size={24} /> Ver Ranking Global
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}
                            {appState === 'ranking' && renderRanking()}
                            {appState === 'setup_config' && renderConfig()}
                            {appState === 'setup_names' && renderNames()}
                            {appState === 'setup_qr' && renderSetupQR()}
                            {appState === 'playing' && renderGame()}
                        </>
                    )}

                    {/* Footer Version */}
                    <div className="absolute bottom-1 md:bottom-2 right-2 md:right-4 text-cyan-300/40 font-mono text-[10px] md:text-xs font-bold tracking-widest z-50 pointer-events-none drop-shadow-md">
                        AVS 3.4
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
